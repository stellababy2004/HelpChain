<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .box { fill:#ffffff; stroke:#1f2a37; stroke-width:1.2; rx:14; ry:14; }
      .title { font: 700 16px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Inter,Arial,sans-serif; fill:#111827; }
      .text { font: 13px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Inter,Arial,sans-serif; fill:#111827; }
      .muted { font: 12px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Inter,Arial,sans-serif; fill:#6b7280; }
      .pill { fill:#f3f4f6; stroke:#d1d5db; stroke-width:1; rx:10; ry:10; }
      .arrow { stroke:#374151; stroke-width:1.6; fill:none; }
      .dash { stroke-dasharray:6 4; }
      .ok { fill:#eaffea; stroke:#16a34a; }
      .warn { fill:#fff7ed; stroke:#f97316; }
      .bad { fill:#ffecec; stroke:#ef4444; }
      .panel { fill:#f9fafb; stroke:#e5e7eb; rx:18; ry:18; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"></polygon>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="760" fill="#ffffff"/>
  <rect x="40" y="40" width="1120" height="680" class="panel"/>

  <text x="70" y="85" class="title">HelpChain Admin — Security Architecture (Auth + RBAC + Audit + Observability)</text>
  <text x="70" y="108" class="muted">SVG = presentation-grade truth • Mermaid = developer-readable counterpart</text>

  <!-- Nodes -->
  <!-- User -->
  <rect x="80" y="150" width="240" height="72" class="box"/>
  <text x="100" y="180" class="title">Admin user</text>
  <text x="100" y="202" class="muted">superadmin / ops / readonly</text>

  <!-- Login endpoints -->
  <rect x="380" y="130" width="220" height="52" class="box"/>
  <text x="400" y="162" class="text">/admin/login (canonical)</text>

  <rect x="380" y="200" width="220" height="52" class="box"/>
  <text x="400" y="232" class="text">/admin/ops/login (secondary)</text>

  <!-- Auth check -->
  <rect x="660" y="160" width="240" height="78" class="box"/>
  <text x="680" y="190" class="title">Auth check</text>
  <text x="680" y="212" class="muted">AdminUser (DB) + password_hash</text>

  <!-- Failed path -->
  <rect x="660" y="270" width="240" height="78" class="warn box"/>
  <text x="680" y="300" class="title">Login failed</text>
  <text x="680" y="322" class="muted">Insert AdminLoginAttempt</text>

  <rect x="940" y="270" width="200" height="78" class="warn box"/>
  <text x="960" y="300" class="title">Lockout?</text>
  <text x="960" y="322" class="muted">429 + Retry-After</text>

  <!-- Success path -->
  <rect x="660" y="90" width="240" height="54" class="ok box"/>
  <text x="680" y="122" class="text">Session established (Flask-Login)</text>

  <rect x="660" y="370" width="240" height="78" class="box"/>
  <text x="680" y="400" class="title">Idle timeout guard</text>
  <text x="680" y="422" class="muted">20 min inactivity → logout</text>

  <rect x="660" y="480" width="240" height="78" class="box"/>
  <text x="680" y="510" class="title">Admin routes</text>
  <text x="680" y="532" class="muted">/admin/* protected area</text>

  <!-- RBAC -->
  <rect x="380" y="480" width="240" height="78" class="box"/>
  <text x="400" y="510" class="title">RBAC allowlist</text>
  <text x="400" y="532" class="muted">admin_role_required(...)</text>

  <!-- Allowed action -->
  <rect x="80" y="470" width="240" height="78" class="ok box"/>
  <text x="100" y="500" class="title">Allowed action</text>
  <text x="100" y="522" class="muted">status/assign/archive/unlock/roles</text>

  <!-- Audit -->
  <rect x="80" y="570" width="240" height="78" class="ok box"/>
  <text x="100" y="600" class="title">AdminAuditEvent</text>
  <text x="100" y="622" class="muted">request.* interest.* admin.role_change</text>

  <rect x="80" y="660" width="240" height="54" class="ok box"/>
  <text x="100" y="692" class="text">Append-only enforced (ORM + PG trigger)</text>

  <!-- Denied logging -->
  <rect x="380" y="590" width="240" height="78" class="warn box"/>
  <text x="400" y="620" class="title">Denied action logging</text>
  <text x="400" y="642" class="muted">security.denied_action (POST/PUT/PATCH/DELETE)</text>

  <!-- Observability -->
  <rect x="940" y="420" width="200" height="60" class="box"/>
  <text x="960" y="452" class="text">/admin/security</text>
  <text x="960" y="472" class="muted">KPIs + anomalies + top tables</text>

  <rect x="940" y="500" width="200" height="60" class="box"/>
  <text x="960" y="532" class="text">/admin/audit</text>
  <text x="960" y="552" class="muted">filters + pagination</text>

  <rect x="940" y="580" width="200" height="60" class="box"/>
  <text x="960" y="612" class="text">/admin/roles</text>
  <text x="960" y="632" class="muted">superadmin governance</text>

  <!-- Arrows -->
  <path d="M 320 186 L 380 156" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 320 186 L 380 226" class="arrow" marker-end="url(#arrowHead)"/>

  <path d="M 600 156 L 660 184" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 600 226 L 660 198" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- success to guard -->
  <path d="M 780 144 L 780 370" class="arrow dash" marker-end="url(#arrowHead)"/>
  <!-- auth failed -->
  <path d="M 780 238 L 780 270" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 900 309 L 940 309" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- guard to routes -->
  <path d="M 780 448 L 780 480" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- routes to RBAC -->
  <path d="M 660 519 L 620 519" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- RBAC allowed -->
  <path d="M 380 519 L 320 519" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- allowed to audit -->
  <path d="M 200 548 L 200 570" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 200 648 L 200 660" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- RBAC denied -> denied logging -->
  <path d="M 500 558 L 500 590" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- denied logging -> security -->
  <path d="M 620 629 L 940 450" class="arrow dash" marker-end="url(#arrowHead)"/>

  <!-- audit -> audit page -->
  <path d="M 320 610 L 940 530" class="arrow dash" marker-end="url(#arrowHead)"/>

  <!-- routes -> security/audit/roles -->
  <path d="M 900 519 L 940 450" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 900 519 L 940 530" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 900 519 L 940 610" class="arrow" marker-end="url(#arrowHead)"/>
</svg>
