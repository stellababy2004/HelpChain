<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <style>
      .title { font: 700 16px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Inter,Arial,sans-serif; fill:#111827; }
      .text  { font: 13px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Inter,Arial,sans-serif; fill:#111827; }
      .muted { font: 12px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Inter,Arial,sans-serif; fill:#6b7280; }
      .lane  { fill:#f9fafb; stroke:#e5e7eb; rx:16; ry:16; }
      .head  { fill:#ffffff; stroke:#d1d5db; rx:12; ry:12; }
      .msg   { fill:#ffffff; stroke:#1f2a37; rx:12; ry:12; }
      .ok    { fill:#eaffea; stroke:#16a34a; }
      .warn  { fill:#fff7ed; stroke:#f97316; }
      .bad   { fill:#ffecec; stroke:#ef4444; }
      .line  { stroke:#9ca3af; stroke-width:1.2; }
      .arrow { stroke:#374151; stroke-width:1.6; fill:none; }
      .dash  { stroke-dasharray:6 4; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"></polygon>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="560" fill="#ffffff"/>
  <text x="60" y="58" class="title">Auth flow detail — Login + Lockout (sequence-like)</text>
  <text x="60" y="82" class="muted">Covers /admin/login and /admin/ops/login: attempts, lockout decision, and responses</text>

  <!-- Lanes -->
  <rect x="60" y="110" width="260" height="400" class="lane"/>
  <rect x="340" y="110" width="260" height="400" class="lane"/>
  <rect x="620" y="110" width="260" height="400" class="lane"/>
  <rect x="900" y="110" width="240" height="400" class="lane"/>

  <!-- Lane headers -->
  <rect x="80" y="128" width="220" height="44" class="head"/>
  <text x="105" y="156" class="text">Browser / Admin</text>

  <rect x="360" y="128" width="220" height="44" class="head"/>
  <text x="405" y="156" class="text">Flask Route</text>

  <rect x="640" y="128" width="220" height="44" class="head"/>
  <text x="690" y="156" class="text">Database</text>

  <rect x="920" y="128" width="200" height="44" class="head"/>
  <text x="965" y="156" class="text">Response</text>

  <!-- Lifelines -->
  <line x1="190" y1="188" x2="190" y2="498" class="line"/>
  <line x1="470" y1="188" x2="470" y2="498" class="line"/>
  <line x1="750" y1="188" x2="750" y2="498" class="line"/>
  <line x1="1020" y1="188" x2="1020" y2="498" class="line"/>

  <!-- Messages -->
  <!-- 1 GET login -->
  <path d="M 190 210 L 470 210" class="arrow" marker-end="url(#arrowHead)"/>
  <text x="235" y="202" class="muted">GET /admin/login (or /admin/ops/login)</text>
  <rect x="380" y="224" width="180" height="44" class="msg"/>
  <text x="392" y="252" class="text">Render login page</text>

  <!-- 2 POST credentials -->
  <path d="M 190 290 L 470 290" class="arrow" marker-end="url(#arrowHead)"/>
  <text x="250" y="282" class="muted">POST credentials</text>
  <rect x="356" y="302" width="228" height="54" class="msg"/>
  <text x="370" y="330" class="text">Check username/password</text>

  <!-- 3 DB read user -->
  <path d="M 470 370 L 750 370" class="arrow" marker-end="url(#arrowHead)"/>
  <text x="535" y="362" class="muted">SELECT AdminUser by username</text>
  <rect x="662" y="384" width="176" height="44" class="msg"/>
  <text x="676" y="412" class="text">User row (or none)</text>

  <!-- 4 Insert attempt always -->
  <path d="M 470 440 L 750 440" class="arrow dash" marker-end="url(#arrowHead)"/>
  <text x="520" y="432" class="muted">INSERT AdminLoginAttempt (ip, ua, success)</text>
  <rect x="640" y="454" width="220" height="44" class="warn msg"/>
  <text x="654" y="482" class="text">AdminLoginAttempt + counters</text>

  <!-- 5 Lockout decision -->
  <rect x="360" y="392" width="220" height="44" class="msg"/>
  <text x="374" y="420" class="text">Compute lockout state</text>
  <text x="374" y="440" class="muted">fail window + threshold</text>

  <!-- Responses -->
  <!-- success -->
  <path d="M 470 330 L 1020 330" class="arrow" marker-end="url(#arrowHead)"/>
  <rect x="920" y="312" width="200" height="54" class="ok msg"/>
  <text x="936" y="340" class="text">302 Redirect</text>
  <text x="936" y="360" class="muted">Session established</text>
  <text x="540" y="322" class="muted">(if credentials valid)</text>

  <!-- lockout -->
  <path d="M 470 420 L 1020 420" class="arrow" marker-end="url(#arrowHead)"/>
  <rect x="920" y="402" width="200" height="62" class="warn msg"/>
  <text x="936" y="430" class="text">429 Too Many Requests</text>
  <text x="936" y="450" class="muted">Retry-After header</text>
  <text x="540" y="412" class="muted">(if lockout active)</text>

  <!-- invalid creds -->
  <path d="M 470 470 L 1020 470" class="arrow" marker-end="url(#arrowHead)"/>
  <rect x="920" y="452" width="200" height="62" class="bad msg"/>
  <text x="936" y="480" class="text">403 Forbidden</text>
  <text x="936" y="500" class="muted">Invalid credentials</text>
  <text x="540" y="462" class="muted">(if fail & not locked)</text>

  <!-- Footer note -->
  <text x="60" y="535" class="muted">
    Notes: lockout logic is DB-backed; success/failed attempts include IP + user_agent; lockout responds with 429 + Retry-After.
  </text>
</svg>
