<!doctype html>
<html lang="bg">
<head><meta charset="utf-8"/><title>Подай заявка - HelpChain</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
  <div class="container mt-4">
    <h1>Подай заявка за помощ</h1>
    {% if message %}
      <div class="alert alert-success">{{ message }}</div>
    {% endif %}
    <form method="post" action="/submit_request">
      <div class="mb-3"><label class="form-label">Заглавие</label><input name="title" class="form-control" required></div>
      <div class="mb-3"><label class="form-label">Описание</label><textarea name="description" class="form-control" rows="4" required></textarea></div>
      <div class="mb-3"><label class="form-label">Категория</label>
        <select name="category" class="form-select">
          <option value="здраве">Здраве</option>
          <option value="администрация">Администрация</option>
          <option value="транспорт">Транспорт</option>
        </select>
      </div>
      <div class="mb-3"><label class="form-label">Имейл (ако не сте влезли)</label><input name="email" type="email" class="form-control"></div>
      <button class="btn btn-primary" type="submit">Подай</button>
    </form>
  </div>
</body>
</html>
