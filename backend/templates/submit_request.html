<!doctype html>
<html lang="bg">
<head><meta charset="utf-8"/><title>Подай заявка - HelpChain</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
  <div class="container mt-4" style="max-width: 450px; margin-top: 60px;">
    <h2 class="mb-4 text-center">Подай заявка за помощ</h2>
    {% if message %}
      <div class="alert alert-success">{{ message }}</div>
    {% endif %}
    <form method="post" action="/submit_request">
      <div class="mb-3"><label class="form-label">Име</label><input name="name" class="form-control" required></div>
      <div class="mb-3"><label class="form-label">Имейл (ако не сте влезли)</label><input name="email" type="email" class="form-control" required></div>
      <div class="mb-3"><label class="form-label">Телефон</label><input name="phone" class="form-control" required></div>
      <div class="mb-3"><label class="form-label">Каква помощ ви е необходима?</label><textarea name="message" class="form-control" rows="4" required></textarea></div>
      <button class="btn btn-primary w-100" type="submit">Изпрати заявка</button>
    </form>
  </div>
</body>
</html>
