<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}HelpChain{% endblock %}</title>
    <style>
        body {
            background-image: url('/static/helpchain_logo.png.png'), linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            background-size: 200px 200px, 400% 400%;
            background-repeat: no-repeat, no-repeat;
            background-position: 95% 5%, 0% 50%;
            background-attachment: fixed, fixed;
            animation: gradientShift 15s ease infinite;
            color: white;
        }
        @keyframes gradientShift {
            0% { background-position: 95% 5%, 0% 50%; }
            50% { background-position: 95% 5%, 100% 50%; }
            100% { background-position: 95% 5%, 0% 50%; }
        }
        .hero-section, .card {
            background-color: rgba(255, 255, 255, 0.9);
            color: black;
        }
        /* Добави социални елементи */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="5" fill="rgba(255,255,255,0.1)"/></svg>');
            background-size: 50px 50px;
            animation: float 20s linear infinite;
            pointer-events: none;
        }
        @keyframes float {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(-100vh); }
        }
    </style>
</head>
<body>
    <a href="/stories">Stories</a>
    <a href="/search">Search</a>
    <a href="/logout" class="btn btn-outline-secondary">Изход</a>
    <a href="/volunteer_register" class="btn btn-primary">Стани доброволец</a>
    {% block content %}{% endblock %}
</body>
</html>
