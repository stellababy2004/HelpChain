<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <style>
      body { font-family: Arial, sans-serif; color: #333; }
      .hero { background:#0d6efd; color:white; padding:20px; border-radius:6px; }
      .content { margin: 16px 0; }
      .footer { font-size: 12px; color: #666; margin-top: 20px; }
    </style>
  </head>
  <body>
    <div class="hero">
      <h1>Добре дошли в HelpChain, {{ username }}!</h1>
    </div>
    <div class="content">
      <p>Благодарим, че се регистрирахте. Можете да влезете в платформата и да започнете да помагате или да подавате заявки.</p>
      <p><a href="https://example.local/">Отиди на HelpChain</a></p>
    </div>
    <div class="footer">
      <p>Ако не сте създали профила, игнорирайте този имейл.</p>
    </div>
  </body>
</html>
