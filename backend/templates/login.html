<!doctype html>
<html lang="bg">
<head><meta charset="utf-8"/><title>Вход - HelpChain</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
  <div class="container mt-4">
    <h1>Вход</h1>
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="mb-3"><label class="form-label">Потребителско име</label><input name="username" class="form-control" required></div>
      <div class="mb-3"><label class="form-label">Парола</label><input name="password" type="password" class="form-control" required></div>
      <button class="btn btn-primary" type="submit">Влез</button>
    </form>
  </div>
</body>
</html>
