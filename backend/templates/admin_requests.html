{% extends "base.html" %} {% block title %}Админ заявки | HelpChain.live{%
endblock %} {% block content %}
<div class="container mt-5">
  <h2 class="mb-4 text-primary text-center">Админски заявки</h2>
  <!-- Форма за филтриране -->
  <form id="filter-form" class="mb-4 d-flex flex-wrap gap-3 align-items-end">
    <div>
      <label for="category" class="form-label">Категория</label>
      <select id="category" name="category" class="form-select">
        <option value="">Всички</option>
        <option value="Медицинска">Медицинска</option>
        <option value="Транспорт">Транспорт</option>
        <option value="Храна">Храна</option>
        <!-- Добавете още категории при нужда -->
      </select>
    </div>
    <div>
      <label for="status" class="form-label">Статус</label>
      <select id="status" name="status" class="form-select">
        <option value="">Всички</option>
        <option value="pending">В изчакване</option>
        <option value="approved">Одобрена</option>
        <option value="rejected">Отхвърлена</option>
      </select>
    </div>
    <div>
      <label for="date" class="form-label">Дата</label>
      <input type="date" id="date" name="date" class="form-control" />
    </div>
    <button type="submit" class="btn btn-primary">Филтрирай</button>
  </form>
  <div class="table-responsive">
    <table class="table table-modern">
      <thead>
        <tr>
          <th class="sortable" data-column="id" data-order="asc">ID</th>
          <th class="sortable" data-column="name" data-order="asc">Име</th>
          <th class="sortable" data-column="email" data-order="asc">Имейл</th>
          <th class="sortable" data-column="category" data-order="asc">
            Категория
          </th>
          <th class="sortable" data-column="location" data-order="asc">
            Локация
          </th>
          <th class="sortable" data-column="created_at" data-order="asc">
            Дата
          </th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Динамично съдържание -->
      </tbody>
    </table>
  </div>
</div>
<style>
  .table-modern {
    width: 100%;
    border-collapse: collapse;
    font-size: 1rem;
    background: #fff;
  }
  .table-modern th,
  .table-modern td {
    padding: 12px 16px;
    border-bottom: 1px solid #e0e0e0;
    text-align: left;
  }
  .table-modern tr:nth-child(even) {
    background: #f9f9f9;
  }
  .table-modern tr:hover {
    background: #e6f0fa;
    transition: background 0.2s;
  }
  .table-modern th {
    background: #f1f5fa;
    cursor: pointer;
    user-select: none;
    position: relative;
  }
  .table-modern th.sortable:hover {
    background: #dde8f7;
  }
  .table-modern th.sorted-asc::after {
    content: " \25B2";
    font-size: 0.9em;
    color: #1976d2;
  }
  .table-modern th.sorted-desc::after {
    content: " \25BC";
    font-size: 0.9em;
    color: #1976d2;
  }
</style>
<script>
  function getFilterParams() {
    const category = document.getElementById("category").value;
    const status = document.getElementById("status").value;
    const date = document.getElementById("date").value;
    return { category, status, date };
  }

  function buildQuery(params) {
    const esc = encodeURIComponent;
    return Object.keys(params)
      .filter((k) => params[k])
      .map((k) => `${esc(k)}=${esc(params[k])}`)
      .join("&");
  }

  function assignSortHandlers() {
    document.querySelectorAll(".table-modern th.sortable").forEach((th) => {
      th.addEventListener("click", function () {
        const column = this.getAttribute("data-column");
        let order = this.getAttribute("data-order");
        order = order === "asc" ? "desc" : "asc";
        document.querySelectorAll(".table-modern th.sortable").forEach((h) => {
          h.classList.remove("sorted-asc", "sorted-desc");
        });
        this.classList.add(order === "asc" ? "sorted-asc" : "sorted-desc");
        this.setAttribute("data-order", order);
        const filters = getFilterParams();
        const query = buildQuery({ ...filters, sort: column, order });
        fetch(`/admin/api/requests?${query}`)
          .then((res) => res.text())
          .then((html) => {
            document.querySelector("#table-body").innerHTML = html;
          });
      });
    });
  }

  document
    .getElementById("filter-form")
    .addEventListener("submit", function (e) {
      e.preventDefault();
      const filters = getFilterParams();
      const query = buildQuery(filters);
      fetch(`/admin/api/requests?${query}`)
        .then((res) => res.text())
        .then((html) => {
          document.querySelector("#table-body").innerHTML = html;
          assignSortHandlers();
        });
    });

  window.addEventListener("DOMContentLoaded", function () {
    fetch("/admin/api/requests")
      .then((res) => res.text())
      .then((html) => {
        document.querySelector("#table-body").innerHTML = html;
        assignSortHandlers();
      });
  });
</script>
{% endblock %}
