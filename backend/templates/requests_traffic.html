<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <title>{{ _('Заявки & Трафик') }} | HelpChain Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        background: #181c24;
        color: #fff;
      }
      .card {
        background: #232a36;
        border: none;
      }
      .table {
        color: #fff;
      }
      .form-select,
      .form-control {
        background: #232a36;
        color: #fff;
        border: 1px solid #444;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <h1 class="mb-4">
        {{ _('Заявки & Трафик') }}
        <span class="fs-5 text-secondary">(HelpChain Admin)</span>
      </h1>
      <form class="row g-2 mb-4" id="filters-form">
        <div class="col-md-2">
          <input
            type="date"
            class="form-control"
            id="filter-date"
            name="date"
            title="{{ _('Дата') }}"
            placeholder="{{ _('Изберете дата') }}"
          />
        </div>
        <div class="col-md-2">
          <select
            class="form-select"
            id="filter-category"
            name="category"
            title="{{ _('Категория') }}"
          >
            <option value="">{{ _('Категория') }}</option>
            <option>{{ _('Медицина') }}</option>
            <option>{{ _('Психолог') }}</option>
            <option>{{ _('Транспорт') }}</option>
          </select>
        </div>
        <div class="col-md-2">
          <select
            class="form-select"
            id="filter-lang"
            name="lang"
            title="{{ _('Език') }}"
          >
            <option value="">{{ _('Език') }}</option>
            <option>BG</option>
            <option>EN</option>
            <option>FR</option>
          </select>
        </div>
        <div class="col-md-2">
          <select
            class="form-select"
            id="filter-country"
            name="country"
            title="{{ _('Държава') }}"
          >
            <option value="">{{ _('Държава') }}</option>
            <option>BG</option>
            <option>FR</option>
            <option>UA</option>
          </select>
        </div>
        <div class="col-md-2">
          <select
            class="form-select"
            id="filter-channel"
            name="channel"
            title="{{ _('Канал') }}"
          >
            <option value="">{{ _('Канал') }}</option>
            <option>web</option>
            <option>mobile</option>
          </select>
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-success w-100">
            {{ _('Филтрирай') }}
          </button>
        </div>
      </form>
      <div class="card p-3 mb-4">
        <table class="table table-hover mb-0" id="requests-table">
          <thead>
            <tr>
              <th>{{ _('Session ID') }}</th>
              <th>{{ _('Език') }}</th>
              <th>{{ _('Категория') }}</th>
              <th>{{ _('Източник') }}</th>
              <th>{{ _('Време (ms)') }}</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="row">
        <div class="col-md-6">
          <canvas id="chart-hour" height="80"></canvas>
        </div>
        <div class="col-md-6">
          <canvas id="chart-category" height="80"></canvas>
        </div>
      </div>
    </div>
    <script>
      function fetchTraffic() {
        const params = new URLSearchParams(
          new FormData(document.getElementById("filters-form")),
        ).toString();
        fetch("/admin/requests-traffic.json?" + params)
          .then((r) => r.json())
          .then((data) => {
            // Таблица
            let tbody = document.querySelector("#requests-table tbody");
            tbody.innerHTML = "";
            data.requests.forEach((r) => {
              let tr = document.createElement("tr");
              tr.innerHTML = `<td>${r.session_id}</td><td>${r.lang}</td><td>${r.category}</td><td>${r.source}</td><td>${r.time_ms}</td>`;
              tbody.appendChild(tr);
            });
            // Графика по час
            window.chartHour.data.labels = data.by_hour.labels;
            window.chartHour.data.datasets[0].data = data.by_hour.data;
            window.chartHour.update();
            // Графика по категории
            window.chartCategory.data.labels = data.by_category.labels;
            window.chartCategory.data.datasets[0].data = data.by_category.data;
            window.chartCategory.update();
          });
      }
      document
        .getElementById("filters-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          fetchTraffic();
        });
      window.addEventListener("DOMContentLoaded", function () {
        let ctx1 = document.getElementById("chart-hour").getContext("2d");
        window.chartHour = new Chart(ctx1, {
          type: "bar",
          data: {
            labels: [],
            datasets: [
              {
                label: "{{ _('Заявки по час') }}",
                data: [],
                backgroundColor: "#4ade80",
              },
            ],
          },
          options: {
            plugins: { legend: { labels: { color: "#fff" } } },
            scales: {
              x: { ticks: { color: "#b0b8c1" } },
              y: { ticks: { color: "#b0b8c1" } },
            },
          },
        });
        let ctx2 = document.getElementById("chart-category").getContext("2d");
        window.chartCategory = new Chart(ctx2, {
          type: "pie",
          data: {
            labels: [],
            datasets: [
              {
                label: "{{ _('Заявки по категории') }}",
                data: [],
                backgroundColor: ["#4ade80", "#60a5fa", "#facc15", "#f87171"],
              },
            ],
          },
          options: { plugins: { legend: { labels: { color: "#fff" } } } },
        });
        fetchTraffic();
        setInterval(fetchTraffic, 15000); // Автоматичен refresh на всеки 15 секунди
      });
    </script>
  </body>
</html>
