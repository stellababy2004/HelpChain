{% extends "base.html" %} {% block content %}
<div class="container mt-5">
  <h2>{{ _('Свържете се с нас') }}</h2>
  <form method="post">
    <div class="mb-3">
      <label for="name">{{ _('Име') }}</label>
      <input type="text" name="name" id="name" class="form-control" required />
    </div>
    <div class="mb-3">
      <label for="email">{{ _('Имейл') }}</label>
      <input
        type="email"
        name="email"
        id="email"
        class="form-control"
        required
      />
    </div>
    <div class="mb-3">
      <label for="message">{{ _('Съобщение') }}</label>
      <textarea
        name="message"
        id="message"
        class="form-control"
        rows="5"
        required
      ></textarea>
    </div>
    <button type="submit" class="btn btn-primary">{{ _('Изпрати') }}</button>
  </form>
</div>
{% endblock %}
