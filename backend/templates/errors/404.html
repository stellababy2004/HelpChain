<!doctype html>
<html lang="bg">
{% extends "base.html" %}

{% block title %}404 - Страницата не е намерена{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass visible text-center">
                <div class="mb-4">
                    <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 4rem;"></i>
                </div>
                <h1 class="h2 mb-3">404 - Страницата не е намерена</h1>
                <p class="text-muted mb-4">
                    Страницата, която търсите, не съществува или е преместена.
                </p>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                    <a href="{{ url_for('index') }}" class="btn btn-primary">
                        <i class="bi bi-house-door me-2"></i>Към началната страница
                    </a>
                    <button onclick="history.back()" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Назад
                    </button>
                </div>
                <hr class="my-4">
                <small class="text-muted">
                    Ако смятате, че това е грешка, моля свържете се с нас.
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
