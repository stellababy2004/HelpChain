<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Създаване на роля - HelpChain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-plus-circle"></i> Създаване на роля
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('admin_roles.roles_dashboard') }}">
                    <i class="fas fa-arrow-left"></i> Обратно
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4><i class="fas fa-user-tag"></i> Нова роля</h4>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            <div class="mb-3">
                                <label for="name" class="form-label">Име на ролята *</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                                <div class="form-text">Уникално име за ролята (например: "Модератор", "Редактор")</div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Описание</label>
                                <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                                <div class="form-text">Кратко описание на ролята и нейните отговорности</div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Права и разрешения</label>
                                <div class="border rounded p-3" style="max-height: 400px; overflow-y: auto;">
                                    {% for permission in permissions %}
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="perm_{{ permission.id }}"
                                            name="permissions" value="{{ permission.id }}">
                                        <label class="form-check-label" for="perm_{{ permission.id }}">
                                            <strong>{{ permission.name }}</strong>
                                            {% if permission.description %}
                                            <br><small class="text-muted">{{ permission.description }}</small>
                                            {% endif %}
                                            {% if permission.is_system_permission %}
                                            <span class="badge bg-secondary ms-2">Системно</span>
                                            {% endif %}
                                        </label>
                                    </div>
                                    {% endfor %}
                                </div>
                                <div class="form-text">Изберете правата, които тази роля ще има</div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="{{ url_for('admin_roles.roles_dashboard') }}" class="btn btn-secondary">
                                    <i class="fas fa-times"></i> Отказ
                                </a>
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-save"></i> Създай роля
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
