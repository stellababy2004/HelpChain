{% extends "base.html" %} {% block title %}{{ _('Обновяване на преводи') }}{%
endblock %} {% block content %}
<h2>{{ _('Обновяване и компилация на преводи') }}</h2>

<form method="POST">
  <label for="language">{{ _('Избери съществуващ език:') }}</label>
  <select id="language" name="language" class="form-select mb-3">
    <option value="">{{ _('-- избери език --') }}</option>
    {% for lang in languages %}
    <option value="{{ lang }}">{{ lang }}</option>
    {% endfor %}
  </select>

  <label for="new_language">{{ _('...или добави нов език:') }}</label>
  <input
    type="text"
    name="new_language"
    class="form-control mb-3"
    placeholder="{{ _('напр. bg, en, fr') }}"
  />

  <button type="submit" class="btn btn-success">
    🔄 {{ _('Обнови и компилирай') }}
  </button>
</form>

<a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary mt-3"
  >⬅ {{ _('Назад') }}</a
>
{% endblock %}
