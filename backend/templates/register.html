<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - HelpChain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5" style="max-width:400px;">
        <h2 class="mb-4">Регистрация</h2>

        {% if message %}
            <div class="alert alert-success" role="alert">
                {{ message }}
            </div>
        {% endif %}

        <form method="post" action="/register">
            <div class="mb-3">
                <label for="username" class="form-label">Потребителско име</label>
                <input type="text" name="username" class="form-control" placeholder="Потребителско име" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Имейл</label>
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Парола</label>
                <input type="password" name="password" class="form-control" placeholder="Парола" required>
            </div>
            <div class="mb-3">
                <label for="role" class="form-label">Роля</label>
                <select name="role" class="form-select">
                    <option value="volunteer">Volunteer</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Регистрирай се</button>
        </form>
        <p>Вече имаш акаунт? <a href="/login">Влез</a></p>
    </div>
</body>
</html>
