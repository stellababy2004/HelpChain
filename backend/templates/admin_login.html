{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Админ вход</h4>
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form method="post">
          <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Потребителско име" required>
          </div>
          <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Парола" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Вход</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
