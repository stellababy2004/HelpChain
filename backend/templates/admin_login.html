{% extends "base.html" %} {% block title %}Вход за админ{% endblock %} {% block
content %}
<div class="container mt-5" style="max-width: 400px">
  <h2 class="mb-4 text-primary">Вход за администратор</h2>
  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="mb-3">
      <label for="username" class="form-label"
        >Потребителско име или имейл:</label
      >
      <input
        type="text"
        class="form-control"
        id="username"
        name="username"
        required
        autofocus
        autocomplete="username"
        placeholder="admin или admin@helpchain.live"
      />
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Парола:</label>
      <input
        type="password"
        class="form-control"
        id="password"
        name="password"
        required
        autocomplete="current-password"
        placeholder="Admin12345! (начална)"
      />
    </div>
    <button type="submit" class="btn btn-primary">Вход</button>
  </form>
</div>
{% endblock %}
