{% extends "base.html" %} {% block content %}
<div class="container mt-5">
  <h2>{{ _('Добави доброволец') }}</h2>
  <form method="post">
    <div class="mb-3">
      <label>{{ _('Име') }}</label>
      <input
        type="text"
        name="name"
        class="form-control"
        required
        title="{{ _('Име') }}"
        placeholder="{{ _('Въведете име') }}"
      />
    </div>
    <div class="mb-3">
      <label>{{ _('Имейл') }}</label>
      <input
        type="email"
        name="email"
        class="form-control"
        required
        title="{{ _('Имейл') }}"
        placeholder="{{ _('Въведете имейл') }}"
      />
    </div>
    <div class="mb-3">
      <label>{{ _('Телефон') }}</label>
      <input
        type="text"
        name="phone"
        class="form-control"
        title="{{ _('Телефон') }}"
        placeholder="{{ _('Въведете телефон') }}"
      />
    </div>
    <div class="mb-3">
      <label>{{ _('Локация') }}</label>
      <input
        type="text"
        name="location"
        class="form-control"
        placeholder="{{ _('Град или регион') }}"
      />
    </div>
    <div class="mb-3">
      <label>{{ _('Умения') }}</label>
      <input
        type="text"
        name="skills"
        class="form-control"
        placeholder="{{ _('Например: медицинска помощ, транспорт, образование') }}"
      />
    </div>
    <button type="submit" class="btn btn-success">{{ _('Добави') }}</button>
    <a href="{{ url_for('admin_volunteers') }}" class="btn btn-primary mb-3"
      >{{ _('Доброволци') }}</a
    >
  </form>
</div>
{% endblock %}
