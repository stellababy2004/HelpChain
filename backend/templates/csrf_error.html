<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Erreur CSRF</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f8d7da;
        color: #721c24;
        padding: 2em;
      }
      .container {
        max-width: 500px;
        margin: auto;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        padding: 2em;
      }
      h1 {
        color: #721c24;
      }
      a {
        color: #0056b3;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Erreur de sécurité (CSRF)</h1>
      <p>
        La requête a été bloquée pour des raisons de sécurité. Veuillez
        réessayer ou recharger la page.
      </p>
      <p><a href="/">Retour à l'accueil</a></p>
    </div>
  </body>
</html>
