{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <div class="alert alert-success">
    <h4 class="alert-heading">✅ Благодарим ви!</h4>
    <p>Получихме заявката ви и ще се свържем с вас възможно най-скоро.</p>

    {% if request_id %}
      <hr>
      <p class="mb-0"><strong>ID на заявката:</strong> {{ request_id }}</p>
    {% endif %}
  </div>

  <div class="d-flex gap-2">
    <a class="btn btn-primary" href="{{ safe_url_for('main.submit_request') }}">
      Подай нова заявка
    </a>
    <a class="btn btn-outline-secondary" href="{{ safe_url_for('main.index') }}">
      Към началото
    </a>
    {% if is_admin and request_id %}
    <a class="btn btn-outline-dark" href="{{ safe_url_for('admin.admin_requests', status='new', highlight=request_id) }}">
      <i class="fas fa-user-shield me-2"></i>Виж в админ
    </a>
    {% endif %}
  </div>
</div>
{% endblock %}
