{% extends "base.html" %} {% block content %}
<div class="container mt-5">
  <h2>{{ _('Редакция на доброволец') }}</h2>
  <form method="post">
    <div class="mb-3">
      <label>{{ _('Име') }}</label>
      <input
        type="text"
        name="name"
        class="form-control"
        value="{{ volunteer.name }}"
        required
        title="{{ _('Име') }}"
        placeholder="{{ _('Въведете име') }}"
      />
    </div>
    <div class="mb-3">
      <label>{{ _('Имейл') }}</label>
      <input
        type="email"
        name="email"
        class="form-control"
        value="{{ volunteer.email }}"
        required
        title="{{ _('Имейл') }}"
        placeholder="{{ _('Въведете имейл') }}"
      />
    </div>
    <div class="mb-3">
      <label>{{ _('Телефон') }}</label>
      <input
        type="text"
        name="phone"
        class="form-control"
        value="{{ volunteer.phone }}"
        title="{{ _('Телефон') }}"
        placeholder="{{ _('Въведете телефон') }}"
      />
    </div>
    <button type="submit" class="btn btn-primary">{{ _('Запази') }}</button>
    <a href="{{ url_for('admin_volunteers') }}" class="btn btn-secondary"
      >{{ _('Назад') }}</a
    >
  </form>
</div>
{% endblock %}
