{% extends "base.html" %}
{% block title %}Edit Volunteer{% endblock %}
{% block content %}
<h1>Edit Volunteer</h1>
<form method="post">
    <input type="text" name="name" value="{{ volunteer.name }}" required><br>
    <input type="email" name="email" value="{{ volunteer.email }}" required><br>
    <input type="text" name="phone" value="{{ volunteer.phone }}"><br>
    <input type="text" name="location" value="{{ volunteer.location }}"><br>
    <button type="submit">Save</button>
</form>
{% endblock %}
