## 🧪 VI. Test Activity (30 ноември 2025)

- Цел: да се стабилизират legacy admin/volunteer тестове без промяна на production поведение.
- Команди използвани (PowerShell):

```powershell
$env:HELPCHAIN_ALLOW_MODULE_ENGINE='1'; $env:HELPCHAIN_LEGACY_ADMIN_ALIAS='1'; pytest -k "admin or volunteer" -q
```

- Резултат (subset run): `130 passed, 1 skipped, 147 deselected, 473 warnings` (duration ~3m 9s).
- Забележка: тестовите изменения са обвързани с opt-in `HELPCHAIN_LEGACY_ADMIN_ALIAS=1` и не променят поведението в production без тази променлива.
- Branche/Commit: промени са локално в branch `feature/bind-module-session`; препоръчва се преглед преди merge.

