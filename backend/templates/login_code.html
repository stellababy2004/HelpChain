<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход с код | HelpChain.bg</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f4f4f4;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }
      .header {
        text-align: center;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 3px solid #007bff;
      }
      .header h1 {
        color: #007bff;
        margin: 0;
        font-size: 2.5em;
      }
      .login-message {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 8px;
        margin: 20px 0;
        text-align: center;
      }
      .form-section {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 8px;
        margin: 20px 0;
        border-left: 4px solid #007bff;
      }
      .form-section label {
        font-weight: bold;
        color: #007bff;
      }
      .form-section input[type="text"] {
        width: 100%;
        padding: 10px;
        margin: 10px 0 20px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 1.1em;
      }
      .form-section button {
        background: linear-gradient(90deg, #667eea 0%, #007bff 100%);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 6px;
        font-size: 1.1em;
        cursor: pointer;
        transition: background 0.2s;
      }
      .form-section button:hover {
        background: linear-gradient(90deg, #007bff 0%, #667eea 100%);
      }
      .info {
        background: #fff3cd;
        padding: 10px;
        border-radius: 6px;
        margin: 15px 0;
        color: #856404;
        border: 1px solid #ffeaa7;
        text-align: center;
      }
      .footer {
        text-align: center;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 2px solid #e9ecef;
        color: #666;
      }
      .emoji {
        font-size: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>HelpChain.bg</h1>
        <p><em>Свързваме хора в нужда с доброволци</em></p>
      </div>
      <div class="login-message">
        <h2><span class="emoji">🔑</span> Вход с код</h2>
        <p>Въведете 6-цифрения код, който изпратихме на вашия имейл.</p>
      </div>
      <form class="form-section" method="post" action="/login/code">
        <label for="code">Код за вход:</label>
        <input
          type="text"
          id="code"
          name="code"
          maxlength="6"
          pattern="\d{6}"
          required
          placeholder="Въведете кода"
        />
        <button type="submit">Вход</button>
      </form>
      <div class="info">
        Не сте получили код? <a href="/login/email">Изпратете нов</a>
      </div>
      <div class="footer">
        <p>
          <strong
            >Благодарим ви, че сте част от HelpChain.bg!
            <span class="emoji">💙</span></strong
          >
        </p>
        <p><em>Заедно правим България по-добро място за всички!</em></p>
        <hr />
        <p>С уважение,<br /><strong>Екипът на HelpChain.bg</strong></p>
      </div>
    </div>
  </body>
</html>
