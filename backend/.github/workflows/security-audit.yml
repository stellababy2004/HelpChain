name: Security Audit

on:
  pull_request:
  push:
    branches: [main, recover-workflows]
    paths:
      - "backend/**"
      - "pyproject.toml"
      - "requirements.txt"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project & audit tools
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi
          pip install pip-audit safety
      - name: Run pip-audit (SARIF)
        run: |
          pip-audit --progress-spinner=off -f sarif -o pip-audit.sarif || true
      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pip-audit.sarif
      - name: Run safety
        run: |
          safety check --json > safety.json || true
      - name: Convert safety JSON to SARIF
        run: |
          python scripts/convert_safety_to_sarif.py safety.json safety.sarif || echo "Conversion failed"
      - name: Upload safety SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: safety.sarif
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-artifacts
          path: |
            pip-audit.sarif
            safety.json
            safety.sarif
      - name: Summarize findings
        if: always()
        run: |
          echo 'Pip-audit SARIF and safety JSON uploaded as artifacts.'
