name: monitor-http-stack-upgrade

on:
  schedule:
    - cron: "15 4 * * *" # Daily 04:15 UTC
  workflow_dispatch: {}

jobs:
  feasibility-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run feasibility monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/monitor_http_stack_upgrade.py
