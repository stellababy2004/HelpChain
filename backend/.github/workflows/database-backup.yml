name: Database Backup

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # Explicitly avoid submodule init/update in this backup workflow.
          # The repo currently has a broken/missing submodule URL which causes
          # `git submodule` operations to fail. This safe change prevents the
          # job from failing while we fix `.gitmodules` in a separate PR.
          submodules: "false"
          fetch-depth: 0

      - name: Detect database file
        id: detect_db
        shell: bash
        run: |
          set -e
          echo "Searching for SQLite DB file to back up..."
          candidates=(
            "instance/volunteers.db"
            "backend/instance/volunteers.db"
            "backend/test_local.sqlite"
          )
          found=""
          for p in "${candidates[@]}"; do
            if [ -f "$p" ]; then
              found="$p"
              break
            fi
          done
          if [ -n "$found" ]; then
            echo "Found DB at: $found"
            echo "db_path=$found" >> "$GITHUB_OUTPUT"
          else
            echo "No DB file found in repo checkout; backup will be skipped."
            echo "db_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy

      - name: Create backup script
        run: |
          cat > backup_db.py << 'EOF'
          import os
          import gzip, shutil
          from datetime import datetime

          DB_PATH = os.getenv("DATABASE_URL", "instance/volunteers.db")
          BACKUP_DIR = "backups"

          # If DB is missing, exit 0 so scheduled job doesn't fail
          if not os.path.exists(DB_PATH):
              print(f"Database not found at {DB_PATH}; skipping backup.")
              raise SystemExit(0)

          os.makedirs(BACKUP_DIR, exist_ok=True)
          ts = datetime.now().strftime("%Y%m%d_%H%M%S")
          backup_file = f"{BACKUP_DIR}/backup_{ts}.db"

          shutil.copy2(DB_PATH, backup_file)
          with open(backup_file, "rb") as fi, gzip.open(f"{backup_file}.gz", "wb") as fo:
              shutil.copyfileobj(fi, fo)
          os.remove(backup_file)

          backups = sorted(f for f in os.listdir(BACKUP_DIR) if f.endswith(".gz"))
          for old in backups[:-7]:
              os.remove(os.path.join(BACKUP_DIR, old))

          print(f"Backup created: {backup_file}.gz")
          EOF

      - name: Run backup
        if: ${{ steps.detect_db.outputs.db_path != '' }}
        env:
          DATABASE_URL: ${{ steps.detect_db.outputs.db_path }}
        run: python backup_db.py

      - name: Upload backup artifact
        if: ${{ steps.detect_db.outputs.db_path != '' }}
        uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9392
        with:
          name: database-backup
          path: backups/
          retention-days: 7

      - name: Skipped (no DB found)
        if: ${{ steps.detect_db.outputs.db_path == '' }}
        run: echo "No database file present in repo; skipping backup job gracefully."
