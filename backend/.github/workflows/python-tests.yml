name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: |
          python -u -m pip install --upgrade pip
          python -m pip install ruff
      - name: Lint (Ruff)
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    env:
      HELPCHAIN_TEST_DEBUG: "0"
      HELPCHAIN_TESTING: "1"
      # Avoid surprises from auto-loaded third-party pytest plugins on the runner
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      # Use an absolute path for the test SQLite DB so migrations and pytest
      # operate on the same file regardless of the runner's working directory.
      DATABASE_URL: "sqlite://${{ github.workspace }}/backend/test_local.sqlite"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -u -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pre-commit
          # ensure coverage is available for generating reports and artifacts
          pip install coverage
          # Ensure BeautifulSoup is available for HTML parsing tests
          pip install beautifulsoup4
          # Ensure pytest exists even if not in requirements
          pip install pytest
      - name: Run database migrations
        # Run migrations from the backend directory so the script and relative
        # paths resolve consistently in CI. Checks should use paths relative
        # to the `backend` working directory (not prefixed with `backend/`).
        working-directory: backend
        run: |
          # Ensure any developer SQLite DB isn't accidentally picked up
          rm -f instance/volunteers.db || true
          echo "Running migrations against: $DATABASE_URL"
          echo '--- alembic.ini head ---'
          if [ -f migrations/alembic.ini ]; then
            head -n 40 migrations/alembic.ini || true
            echo '--- end of head ---'
            # Find first non-empty, non-comment line to sanity-check INI format
            first=$(grep -v '^[[:space:]]*$' migrations/alembic.ini | grep -v '^[[:space:]]*#' | head -n1 || true)
            echo "First significant line: '$first'"
            if ! echo "$first" | grep -q '^\['; then
              echo "ERROR: migrations/alembic.ini does not look like a valid INI (first line above)." >&2
              echo "Failing early to avoid confusing Alembic errors; please ensure the file is not overwritten." >&2
              exit 2
            fi
          else
            echo 'migrations/alembic.ini not found' >&2
            exit 2
          fi
          # Print current directory for troubleshooting
          echo "Working dir: $(pwd)"
          ls -la || true
          # Ensure no leftover sqlite file remains from previous runs on the runner
          echo "Removing any existing sqlite DB file (test_local.sqlite) to ensure clean migrations"
          rm -f test_local.sqlite || true
          python -u run_migrations.py
      - name: Verify migrated schema
        working-directory: backend
        run: |
          python - <<'PY'
          import os, sqlite3, sys
          db = 'test_local.sqlite'
          print('db exists', os.path.exists(db))
          if not os.path.exists(db):
              sys.exit('DB file missing')
          conn = sqlite3.connect(db)
          cur = conn.cursor()
          tables = [r[0] for r in cur.execute("SELECT name FROM sqlite_master WHERE type='table'").fetchall()]
          print('tables:', tables)
          for t in ('admin_users','analytics_events'):
              print(f'PRAGMA table_info({t}):')
              try:
                  for row in cur.execute(f"PRAGMA table_info({t})"):
                      print(row)
              except Exception as e:
                  print('ERROR reading PRAGMA for', t, e)
          conn.close()
          PY
      - name: CI diagnostics
        run: |
          echo "CI diagnostics:"
          echo "DATABASE_URL=$DATABASE_URL"
          python --version
          pip --version
          echo "PWD: $(pwd)"
          ls -la
          echo "--- sqlite quick check ---"
          # Try the sqlite3 CLI first (may not be installed on runner)
          if command -v sqlite3 >/dev/null 2>&1; then
            echo "sqlite3 CLI present; listing tables in backend/test_local.sqlite"
            sqlite3 backend/test_local.sqlite ".tables" || true
          else
          echo "sqlite3 CLI not found; using Python sqlite3 module to list tables"
          printf "%s\n" \
            "import os,sqlite3" \
            "db='backend/test_local.sqlite'" \
            "print('db exists', os.path.exists(db))" \
            "if os.path.exists(db):" \
            "  try:" \
            "    conn=sqlite3.connect(db)" \
            "    cur=conn.execute(\"SELECT name FROM sqlite_master WHERE type='table'\")" \
            "    tables=[r[0] for r in cur.fetchall()]" \
            "    print('tables:', tables)" \
            "    conn.close()" \
            "  except Exception as e:" \
            "    print('python sqlite3 check failed:', e)" \
            "else:" \
            "  print('db file not present')" \
            > /tmp/check_sqlite.py
          python /tmp/check_sqlite.py || true
      - name: Run pre-commit
        run: |
          pre-commit run --all-files || true
      - name: Run tests and generate coverage
        working-directory: backend
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then
            echo "Running tests under coverage from backend/"
            # Use backend as CWD so imports like `import appy` resolve reliably
            python -c "import sys, pytest; print('pytest', pytest.__version__); print('python', sys.version)"
            python -m coverage run -m pytest -c pytest.ini --rootdir=. -vv --maxfail=1 || exit $?
            echo "Generating coverage reports"
            python -m coverage xml -o coverage.xml || true
            python -m coverage html -d coverage_html || true
            ls -la coverage.xml || true
            ls -la coverage_html || true
          else
            echo "No tests found"
          fi

      - name: Upload coverage xml artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-xml
          path: backend/coverage.xml

      - name: Upload coverage html artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-html
          path: backend/coverage_html
