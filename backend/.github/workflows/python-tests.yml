name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HELPCHAIN_TEST_DEBUG: "0"
      DATABASE_URL: "sqlite:///test.db"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -u -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pre-commit
      - name: Run database migrations
        # Ensure the test database schema is created before running pytest
        run: |
          echo "Running migrations against: $DATABASE_URL"
          echo '--- alembic.ini head ---'
          if [ -f backend/migrations/alembic.ini ]; then head -n 20 backend/migrations/alembic.ini || true; else echo 'backend/migrations/alembic.ini not found'; fi
          echo '--- end ---'
          python -u run_migrations.py
      - name: CI diagnostics
        run: |
          echo "CI diagnostics:"
          echo "DATABASE_URL=$DATABASE_URL"
          python --version
          pip --version
          echo "PWD: $(pwd)"
          ls -la
      - name: Run pre-commit
        run: |
          pre-commit run --all-files || true
      - name: Run tests
        run: |
          if [ -f backend/pytest.ini ] || [ -d backend/tests ]; then
            pytest -q --maxfail=1
          else
            echo "No tests found"
          fi
