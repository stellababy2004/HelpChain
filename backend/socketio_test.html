<!DOCTYPE html>
<html>
<head>
    <title>SocketIO Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body>
    <h1>SocketIO Connection Test</h1>
    <div id="status">Connecting...</div>
    <div id="messages"></div>

    <script>
        const socket = io('http://127.0.0.1:5000');

        const statusDiv = document.getElementById('status');
        const messagesDiv = document.getElementById('messages');

        socket.on('connect', function() {
            statusDiv.textContent = 'Connected to WebSocket server!';
            statusDiv.style.color = 'green';
            console.log('Connected with ID:', socket.id);

            // Join analytics room
            socket.emit('join_analytics', {room: 'analytics'});
        });

        socket.on('disconnect', function() {
            statusDiv.textContent = 'Disconnected from WebSocket server';
            statusDiv.style.color = 'red';
            console.log('Disconnected');
        });

        socket.on('connected', function(data) {
            addMessage('Server response: ' + JSON.stringify(data));
        });

        socket.on('joined_room', function(data) {
            addMessage('Joined room: ' + JSON.stringify(data));
        });

        socket.on('analytics_notification', function(notification) {
            addMessage('Analytics notification: ' + JSON.stringify(notification));
        });

        function addMessage(message) {
            const div = document.createElement('div');
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            messagesDiv.appendChild(div);
        }

        // Test analytics update request
        setTimeout(function() {
            socket.emit('request_analytics_update');
            addMessage('Requested analytics update');
        }, 2000);
    </script>
</body>
