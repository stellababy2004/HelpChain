<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ известие: Нов доброволец</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        color: #333;
      }
      .box {
        padding: 20px;
        background: #f5f5f5;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h3>🔔 Нов доброволец се регистрира</h3>
      <p><strong>Име:</strong> {{ name }}</p>
      <p><strong>Имейл:</strong> {{ email }}</p>
      <p>Може да го проверите в админ панела.</p>
      <p><a href="{{ url_for('index') }}">Начало</a></p>
      <p><a href="{{ url_for('register') }}">Регистрация</a></p>
    </div>
  </body>
</html>
