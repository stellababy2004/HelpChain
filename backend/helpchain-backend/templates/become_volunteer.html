{% extends "base.html" %} {% block title %}Стани доброволец | HelpChain.live{%
endblock %} {% block content %}
<div class="container mt-5">
  <h2 class="mb-4">Стани доброволец</h2>
  <p>
    Помогнете на хора в нужда като се присъедините към нашата общност от
    доброволци.
  </p>
  <form action="/become_volunteer" method="post">
    <div class="mb-3">
      <label for="name" class="form-label">Име</label>
      <input type="text" class="form-control" id="name" name="name" required />
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Имейл</label>
      <input
        type="email"
        class="form-control"
        id="email"
        name="email"
        required
      />
    </div>
    <div class="mb-3">
      <label for="phone" class="form-label">Телефон</label>
      <input type="tel" class="form-control" id="phone" name="phone" required />
    </div>
    <div class="mb-3">
      <label for="location" class="form-label">Локация</label>
      <input
        type="text"
        class="form-control"
        id="location"
        name="location"
        required
      />
    </div>
    <div class="mb-3">
      <label for="skills" class="form-label">Умения (опционално)</label>
      <textarea
        class="form-control"
        id="skills"
        name="skills"
        rows="3"
      ></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Запиши се</button>
  </form>
</div>
{% endblock %}
