import os
from alembic.config import Config
from alembic.command import upgrade

def run_migrations():
    # Ако има env var DATABASE_URL използвай я, иначе fallback
    database_url = os.environ.get("DATABASE_URL", "sqlite:///backend/instance/volunteers.db")

    repo_root = os.path.abspath(os.path.dirname(__file__))  # repo root where run_migrations.py sits
    # adjust to point at backend/migrations/alembic.ini
    alembic_ini = os.path.join(repo_root, "backend", "migrations", "alembic.ini")
    if not os.path.exists(alembic_ini):
        # try alternate path (if run_migrations.py lives in repo root)
        alt = os.path.join(repo_root, "migrations", "alembic.ini")
        if os.path.exists(alt):
            alembic_ini = alt

    alembic_cfg = Config(alembic_ini)

    # Ensure script_location is set explicitly (relative to repo root)
    script_loc = os.path.join("backend", "migrations")
    alembic_cfg.set_main_option("script_location", script_loc)

    # Ensure the sqlalchemy.url is set from env (CI workflow will set DATABASE_URL)
    alembic_cfg.set_main_option("sqlalchemy.url", database_url)

    # Optional: make output unbuffered
    print(f"Running migrations using ini: {alembic_ini!r}, script_location: {script_loc}, sqlalchemy.url: {database_url}")

    # Run upgrade head
    upgrade(alembic_cfg, "head")

if __name__ == "__main__":
    run_migrations()
