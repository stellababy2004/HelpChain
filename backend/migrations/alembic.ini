# Alembic configuration for HelpChain migrations
# This file must be a valid INI. Some CI failures were caused by accidental
# overwrites where the file started with Python source (e.g. `import os`).
# Keep the [alembic] section at the top so configparser detects sections correctly.
# Alembic configuration for HelpChain migrations
# This file must be a valid INI. Some CI failures were caused by accidental
# overwrites where the file started with Python source (e.g. `import os`).
# Keep the [alembic] section at the top so configparser detects sections correctly.
# Alembic configuration for HelpChain migrations
# This file must be a valid INI. Some CI failures were caused by accidental
# overwrites where the file started with Python source (e.g. `import os`).
# Keep the [alembic] section at the top so configparser detects sections correctly.
[alembic]
# path to migration scripts
# use a path relative to the repository (this file is in migrations/),
# not 'backend/migrations' which causes Alembic to look for backend/backend/migrations
# when run from the repository root. Pointing to 'migrations' ensures the
# script_location is resolved correctly both locally and in CI.
script_location = migrations

# sqlalchemy.url is overridden by run_migrations.py when invoked in CI
sqlalchemy.url = sqlite:///placeholder.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemy]
level = INFO
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
