# Render deployment configuration
services:
  - type: web
    name: helpchain-backend
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: helpchain-db
          property: connectionString

databases:
  - name: helpchain-db
    databaseName: helpchain
    user: helpchain_user
