[pytest]
minversion = 7.0
norecursedirs = HelpChain.bg helpchain_backend dev_scripts scripts .venv venv venv_old htmlcov old_db .git __pycache__
testpaths =
    tests
    backend/tests
python_files = test_*.py
pythonpath = .
addopts =
    -ra
    --strict-config
    --strict-markers
    -p no:pytest_asyncio
    --ignore=test_admin_direct.py
    --ignore=test_admin_password.py

filterwarnings =
    # Strict in our code/tests
    error::DeprecationWarning:tests.*
    error::PendingDeprecationWarning:tests.*
    error::DeprecationWarning:backend.*
    error::PendingDeprecationWarning:backend.*

    # Vendor/framework noise
    ignore::DeprecationWarning:sqlalchemy.*
    ignore::PendingDeprecationWarning:sqlalchemy.*
    ignore::DeprecationWarning:bs4.*
    ignore::PendingDeprecationWarning:bs4.*
    ignore::DeprecationWarning:pkg_resources.*
    ignore::PendingDeprecationWarning:pkg_resources.*
    ignore:'locked_cached_property' is deprecated and will be removed in Flask 2.4.:DeprecationWarning:flask_babel
    ignore::UserWarning:flask_caching
    ignore::DeprecationWarning:flask_caching
    ignore:datetime\.datetime\.utcfromtimestamp\(\) is deprecated:DeprecationWarning:dateutil.tz.tz
    ignore:CSR support in pyOpenSSL is deprecated.:DeprecationWarning
    ignore:ARC4 has been moved:cryptography.utils.CryptographyDeprecationWarning
    ignore:TripleDES has been moved:cryptography.utils.CryptographyDeprecationWarning
    ignore:Use CertificateIssuerPublicKeyTypes instead:cryptography.utils.CryptographyDeprecationWarning
    ignore:Use CertificateIssuerPrivateKeyTypes instead:cryptography.utils.CryptographyDeprecationWarning
    ignore:Use CertificatePublicKeyTypes instead:cryptography.utils.CryptographyDeprecationWarning
    ignore:Use PrivateKeyTypes instead:cryptography.utils.CryptographyDeprecationWarning
    ignore:The default datetime adapter is deprecated as of Python 3.12:DeprecationWarning:sqlalchemy.engine.default
    ignore:Type google\._upb\._message\.MessageMapContainer uses PyType_Spec with a metaclass that has custom tp_new\.:DeprecationWarning:google._upb._message
    ignore:Type google\._upb\._message\.ScalarMapContainer uses PyType_Spec with a metaclass that has custom tp_new\.:DeprecationWarning:google._upb._message

    # Pytest warning policy
    ignore:Test functions should return None:_pytest.warning_types.PytestReturnNotNoneWarning

    # Keep all remaining warnings visible
    default
