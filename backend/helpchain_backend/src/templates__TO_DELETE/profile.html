<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Профил - HelpChain</title>
    <link
      rel="stylesheet"
      href="{{ url_lang('static', filename='css/style.css') }}"
    />
    <style>
      body {
        font-family: "Arial", sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
      }

      header {
        background-color: #007bff;
        color: white;
        padding: 10px 0;
      }

      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
      }

      .logo {
        font-size: 24px;
        font-weight: bold;
        text-decoration: none;
        color: white;
      }

      .nav-menu {
        list-style: none;
        display: flex;
        margin: 0;
        padding: 0;
      }

      .nav-menu li {
        margin-left: 20px;
      }

      .nav-menu a {
        color: white;
        text-decoration: none;
        padding: 10px;
        transition: background-color 0.3s;
      }

      .nav-menu a:hover {
        background-color: #0056b3;
        border-radius: 5px;
      }

      main {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        color: #333;
      }

      form {
        display: flex;
        flex-direction: column;
      }

      label {
        margin-top: 10px;
        font-weight: bold;
      }

      input,
      textarea {
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ddd;
        border-radius: 5px;
      }

      button {
        margin-top: 20px;
        padding: 10px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      button:hover {
        background-color: #218838;
      }

      footer {
        text-align: center;
        padding: 20px;
        background-color: #007bff;
        color: white;
        margin-top: 20px;
      }
    </style>
  </head>

  <body>
    <header>
      <nav>
        <div class="nav-container">
          <a href="{{ safe_url_for('index') }}" class="logo">HelpChain</a>
          <ul class="nav-menu">
            <li><a href="{{ safe_url_for('index') }}">Начало</a></li>
            <li><a href="{{ safe_url_for('about') }}">За нас</a></li>
            <li><a href="{{ safe_url_for('dashboard') }}">Dashboard</a></li>
            <li><a href="{{ safe_url_for('profile') }}">Профил</a></li>
            <li><a href="{{ safe_url_for('logout') }}">Изход</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main>
      <h1>Редактирай профил</h1>
      <form method="POST" enctype="multipart/form-data">
        <label for="skills">Умения:</label>
        <input
          type="text"
          id="skills"
          name="skills"
          value="{{ current_user.skills or '' }}"
        />

        <label for="location">Локация:</label>
        <input
          type="text"
          id="location"
          name="location"
          value="{{ current_user.location or '' }}"
        />

        <label for="available_time">Налично време:</label>
        <input
          type="text"
          id="available_time"
          name="available_time"
          value="{{ current_user.available_time or '' }}"
        />

        <label for="profile_picture">Профилна снимка:</label>
        <input type="file" id="profile_picture" name="profile_picture" />

        <button type="submit">Запази промените</button>
      </form>
    </main>

    <footer>
      <p>&copy; 2025 HelpChain. Всички права запазени.</p>
    </footer>
  </body>
</html>
