<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заявката е получена | HelpChain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: linear-gradient(135deg, #f5f7fa 0%, #e0e7ef 100%); }
    .main-card { max-width: 520px; margin: 64px auto; border-radius: 24px; box-shadow: 0 4px 32px rgba(0,0,0,0.07); background: #fff; padding: 48px 24px 32px 24px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 18px; }
    .success-icon { color: #28a745; font-size: 2.5rem; margin-bottom: 12px; }
    .lead { font-size: 1.13rem; }
    .mt-4 { margin-top: 1.5rem; }
    @media (max-width: 600px) { .main-card { padding: 24px 4px 16px 4px; } }
  </style>
</head>
<body>
  <div class="main-card text-center">
    <div class="success-icon">
      <i class="fa-solid fa-circle-check"></i>
    </div>
    <h1>Заявката е получена</h1>
    <div class="lead mb-3">Благодарим! Получихме Вашата заявка.<br>При възможност доброволец или организация ще се свърже с Вас.</div>
    {% if emergency_line %}
      <div class="alert alert-warning mt-4">{{ emergency_line }}</div>
    {% endif %}
    <a href="/" class="btn btn-outline-primary mt-4">Към началната страница</a>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
