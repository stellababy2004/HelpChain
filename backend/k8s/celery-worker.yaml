apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: helpchain
  labels:
    app: helpchain
    component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helpchain
      component: celery-worker
  template:
    metadata:
      labels:
        app: helpchain
        component: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: helpchain:latest  # Replace with your actual image
        command: ["celery", "-A", "celery_app.celery", "worker", "--loglevel=info"]
        env:
        - name: DATABASE_URL
          value: "postgresql://helpchain:$(POSTGRES_PASSWORD)@postgres-service:5432/helpchain"
        - name: SECRET_KEY
          valueFrom:
            configMapKeyRef:
              name: helpchain-config
              key: SECRET_KEY
        - name: FLASK_ENV
          valueFrom:
            configMapKeyRef:
              name: helpchain-config
              key: FLASK_ENV
        - name: CELERY_BROKER_URL
          valueFrom:
            configMapKeyRef:
              name: helpchain-config
              key: CELERY_BROKER_URL
        - name: CELERY_RESULT_BACKEND
          valueFrom:
            configMapKeyRef:
              name: helpchain-config
              key: CELERY_RESULT_BACKEND
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: helpchain-secret
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: models-storage
          mountPath: /app/models
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: models-storage
        emptyDir: {}  # Use PVC in production