apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: helpchain
  labels:
    app: helpchain
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helpchain
      component: database
  template:
    metadata:
      labels:
        app: helpchain
        component: database
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "helpchain"
        - name: POSTGRES_USER
          value: "helpchain"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: helpchain-secret
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - helpchain
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - helpchain
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: helpchain
  labels:
    app: helpchain
    component: database
spec:
  selector:
    app: helpchain
    component: database
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP