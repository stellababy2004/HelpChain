apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: helpchain
  labels:
    app: helpchain
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helpchain
      component: redis
  template:
    metadata:
      labels:
        app: helpchain
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "yes"]
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: helpchain
  labels:
    app: helpchain
    component: redis
spec:
  selector:
    app: helpchain
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
