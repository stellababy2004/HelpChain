apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helpchain-ingress
  namespace: helpchain
  labels:
    app: helpchain
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # If using cert-manager
spec:
  ingressClassName: nginx  # Adjust based on your ingress controller
  tls:
  - hosts:
    - helpchain.live
    - www.helpchain.live
    secretName: helpchain-tls
  rules:
  - host: helpchain.live
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: helpchain-service
            port:
              number: 80
  - host: www.helpchain.live
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: helpchain-service
            port:
              number: 80