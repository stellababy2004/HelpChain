<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Моите задачи - HelpChain</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="{{ safe_url_for('index') }}">HelpChain</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="{{ safe_url_for('volunteer_dashboard') }}"
            >Табло</a
          >
          <a class="nav-link active" href="{{ safe_url_for('my_tasks') }}"
            >Моите задачи</a
          >
          <a class="nav-link" href="{{ safe_url_for('available_tasks') }}"
            >Налични задачи</a
          >
          <form class="d-inline" method="post" action="{{ safe_url_for('main.volunteer_logout') }}">
            {% if csrf_token %}<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">{% endif %}
            <button class="nav-link btn btn-link p-0 text-decoration-none" type="submit">Изход</button>
          </form>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <h1>Моите задачи</h1>
      <p class="text-muted">
        Тук ще се показват задачите, които сте поели като доброволец.
      </p>

      <div class="alert alert-info">
        <strong>Информация:</strong> Тази страница е в процес на разработка.
        Скоро ще можете да виждате и управлявате своите активни задачи.
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
