{% extends "base.html" %}

{% block title %}{{ _("Email 2FA") }}{% endblock %}

{% block content %}
<main class="container py-4">
  <h1>{{ _("Verification code") }}</h1>
  <form method="post">
    <div class="mb-3">
      <label for="code" class="form-label">{{ _("Verification code") }}</label>
      <input id="code" name="code" type="text" class="form-control" maxlength="6" required>
    </div>
    <button type="submit" class="btn btn-primary">{{ _("Confirm") }}</button>
  </form>
</main>
{% endblock %}
