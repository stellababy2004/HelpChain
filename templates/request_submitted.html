{% extends "base.html" %}

{% block title %}Request sent | HelpChain{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 760px;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 mb-2">✅ Request sent</h1>
      <p class="text-muted mb-3">A volunteer will contact you within 24 hours.</p>

      {% if tracking %}
        <div class="p-3 rounded bg-light border">
          <div class="small text-muted">Tracking number</div>
          <div class="h5 mb-0">{{ tracking }}</div>
        </div>
      {% endif %}

      <div class="mt-4 d-flex gap-2">
        <a class="btn btn-primary" href="{{ url_for('main.submit_request') }}">Send another request</a>
        <a class="btn btn-outline-secondary" href="{{ url_for('main.index') }}">Home</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
