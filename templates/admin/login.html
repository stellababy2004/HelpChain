<!doctype html>
<html lang="{{ g.locale if g is defined and g.locale else 'fr' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin login - HelpChain</title>

  <link href="{{ url_for('static', filename='vendor/jsdelivr/bootstrap-5.3.0.min.css') }}" rel="stylesheet"/>

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f7fb;
    }

    .card {
      width: min(100%, 360px);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      background: white;
    }

    .btn-main {
      height: 48px;
      border-radius: 12px;
      font-weight: 600;
    }

    .btn-dev {
      margin-top: 10px;
      height: 44px;
      border-radius: 10px;
      background: #f1f5f9;
      border: 1px solid #d0d7e2;
    }
  </style>
</head>

<body>

<div class="card">

  <h4 class="mb-3">Admin login</h4>

  <form method="post" action="{{ url_for('admin.admin_login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="next" value="{{ next or '' }}">

    <div class="mb-3">
      <input type="text" name="username" class="form-control" placeholder="Username" required>
    </div>

    <div class="mb-3">
      <input type="password" name="password" class="form-control" placeholder="Password" required>
    </div>

    <button type="submit" class="btn btn-primary btn-main w-100">
      Sign in as admin
    </button>
  </form>

  <!-- 🚀 ONE BUTTON SYSTEM -->
  <button type="button" id="dev-bootstrap-btn" type="button" class="btn btn-dev w-100">
    🚀 Initialiser système complet (démo)
  </button>

  <div
    id="dev-bootstrap-status"
    class="alert mt-3 mb-0"
    hidden
    role="status"
    aria-live="polite"
  ></div>

</div>

<script src="{{ url_for('static', filename='js/admin-login-bootstrap.js') }}"></script>

</body>
</html>
