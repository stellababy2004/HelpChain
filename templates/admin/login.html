<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ _('Admin login') }} - HelpChain</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
              <div class="card-header bg-danger text-white">
              <h3 class="text-center">{{ _('Admin login') }}</h3>
            </div>
            <div class="card-body">
              <form method="post" action="{{ url_for('admin.ops_login') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="next" value="{{ next or '' }}">

  <!-- Hidden fields to confuse browser autocomplete -->
  <input type="text" class="d-none" autocomplete="username" aria-hidden="true" />
  <input type="password" class="d-none" autocomplete="current-password" aria-hidden="true" />

  <div class="mb-3">
    <label for="username" class="form-label">
      {{ _('Username') }}
    </label>
    <input
      type="text"
      class="form-control"
      id="username"
      name="username"
      required
      autocomplete="off"
      aria-label="{{ _('Username') }}"
      placeholder="{{ _('Username') }}"
    />
  </div>

  <div class="mb-3">
    <label for="password" class="form-label">
      {{ _('Password') }}
    </label>
    <input
      type="password"
      class="form-control"
      id="password"
      name="password"
      required
      autocomplete="off"
      aria-label="{{ _('Password') }}"
      placeholder="{{ _('Password') }}"
    />
  </div>

  <button type="submit" class="btn btn-danger w-100">
    {{ _('Sign in as admin') }}
  </button>
</form>
              <div class="text-center mt-3">
                <a href="/">Обратно към сайта</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      window.addEventListener("pageshow", function (event) {
        if (event.persisted) {
          // Page was restored from bfcache
          // Re-establish the connection to the extension here
          console.log(
            "Page restored from bfcache, re-establishing extension connection.",
          );
          // Example: chrome.runtime.connect(...) or chrome.runtime.sendMessage(...)
        }
      });

      // Also, handle the initial connection when the page loads normally
      // ... establish initial extension connection ...
    </script>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mt-2">
          {% for category, msg in messages %}
            <div class="alert alert-{{ category if category else 'info' }}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
  </body>
</html>
