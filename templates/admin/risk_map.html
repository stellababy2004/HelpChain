{% extends "base.html" %}

{% block title %}Territorial Risk Map{% endblock %}

{% block extra_css %}
  {{ super() }}
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
{% endblock %}

{% block content %}
<div
  class="container-fluid py-3"
  data-risk-map-root
  data-endpoint="{{ url_for('admin_map_api.admin_risk_map_api') }}"
  data-default-lat="46.603354"
  data-default-lng="1.888334"
  data-default-zoom="6"
>
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="h4 mb-0">Territorial Risk Map</h1>
  </div>
  <div class="alert alert-secondary mb-3" id="riskMapStateBar" role="status">
    Loading territorial risk data...
  </div>
  <div id="riskMapCanvas" style="height:600px; min-height:480px;"></div>
</div>
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="{{ url_for('static', filename='js/admin-risk-map.js') }}"></script>
{% endblock %}
