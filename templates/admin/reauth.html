<!doctype html>
<html lang="{{ g.locale if g is defined and g.locale else 'fr' }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmation d’identité - HelpChain</title>
    <link
      href="{{ url_for('static', filename='vendor/jsdelivr/bootstrap-5.3.0.min.css') }}"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card">
            <div class="card-header bg-secondary text-white">
              <h3 class="text-center mb-0">Confirmation d’identité</h3>
            </div>
            <div class="card-body">
              <p class="text-muted mb-3">
                Veuillez confirmer votre identité pour continuer.
              </p>
              <form method="post" action="{{ url_for('admin.admin_reauth') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="next" value="{{ next or '' }}">
                <div class="mb-3">
                  <label for="password" class="form-label">Mot de passe</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    required
                    autocomplete="current-password"
                  />
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Confirmer
                </button>
              </form>
              <div class="text-center mt-3">
                <a href="{{ url_for('admin.admin_requests') }}">Retour à l’espace admin</a>
              </div>
            </div>
          </div>
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              <div class="mt-3">
                {% for category, msg in messages %}
                  <div class="alert alert-{{ category if category else 'info' }}">{{ msg }}</div>
                {% endfor %}
              </div>
            {% endif %}
          {% endwith %}
        </div>
      </div>
    </div>
  </body>
</html>
