<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Профил - HelpChain</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="/">HelpChain</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
          <a class="nav-link" href="{{ url_for('logout') }}">Изход</a>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <!-- Breadcrumbs -->
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="{{ url_for('volunteer_dashboard') }}">
              <i class="fas fa-home me-1"></i>Dashboard
            </a>
          </li>
          <li class="breadcrumb-item active" aria-current="page">
            <i class="fas fa-user me-1"></i>Моят профил
          </li>
        </ol>
      </nav>

      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card">
            <div class="card-header">
              <h3>Моят профил</h3>
            </div>
            <div class="card-body">
              <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                  <label for="skills" class="form-label">Умения</label>
                  <input
                    type="text"
                    class="form-control"
                    id="skills"
                    name="skills"
                    value="{{ current_user.skills or '' }}"
                  />
                </div>
                <div class="mb-3">
                  <label for="location" class="form-label">Локация</label>
                  <input
                    type="text"
                    class="form-control"
                    id="location"
                    name="location"
                    value="{{ current_user.location or '' }}"
                  />
                </div>
                <div class="mb-3">
                  <label for="available_time" class="form-label"
                    >Налично време</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="available_time"
                    name="available_time"
                    value="{{ current_user.available_time or '' }}"
                  />
                </div>
                <div class="mb-3">
                  <label for="profile_picture" class="form-label"
                    >Профилна снимка</label
                  >
                  <input
                    type="file"
                    class="form-control"
                    id="profile_picture"
                    name="profile_picture"
                  />
                </div>
                <button type="submit" class="btn btn-primary">
                  Запази промените
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
