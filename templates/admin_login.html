<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ вход - HelpChain</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header bg-danger text-white">
              <h3 class="text-center">Админ вход</h3>
            </div>
            <div class="card-body">
              <form method="POST" autocomplete="off">
                <!-- Hidden fields to confuse browser autocomplete -->
                <input
                  type="text"
                  class="d-none"
                  autocomplete="username"
                  aria-hidden="true"
                />
                <input
                  type="password"
                  class="d-none"
                  autocomplete="current-password"
                  aria-hidden="true"
                />
                <div class="mb-3">
                  <label for="username" class="form-label"
                    >Потребителско име</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    required
                    autocomplete="off"
                  />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Парола</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    required
                    autocomplete="off"
                  />
                </div>
                <button type="submit" class="btn btn-danger w-100">
                  Влез като админ
                </button>
              </form>
              <div class="text-center mt-3">
                <a href="/">Обратно към сайта</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      window.addEventListener("pageshow", function (event) {
        if (event.persisted) {
          // Page was restored from bfcache
          // Re-establish the connection to the extension here
          console.log(
            "Page restored from bfcache, re-establishing extension connection.",
          );
          // Example: chrome.runtime.connect(...) or chrome.runtime.sendMessage(...)
        }
      });

      // Also, handle the initial connection when the page loads normally
      // ... establish initial extension connection ...
    </script>
  </body>
</html>
