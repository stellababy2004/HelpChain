<!doctype html>
<html lang="{{ g.locale if g is defined and g.locale else 'fr' }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ _("2FA setup") }} - HelpChain</title>
    <link
      href="{{ url_for('static', filename='vendor/jsdelivr/bootstrap-5.3.0.min.css') }}"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card">
            <div class="card-header bg-info text-white">
              <h3 class="text-center">{{ _("Set up 2FA") }}</h3>
            </div>
            <div class="card-body">
              <p>
                {{ _("Scan the QR code with your 2FA app (Google Authenticator, Authy, etc.):") }}
              </p>

              <div class="text-center mb-4">
                <img
                  src="data:image/png;base64,{{ qrcode }}"
                  alt="{{ _('QR code') }}"
                  class="img-fluid"
                />
              </div>

              <p class="text-muted">
                {{ _("Or enter manually:") }} <code>{{ totp_uri }}</code>
              </p>

              <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                  <label for="token" class="form-label"
                    >{{ _("Enter the code from the app") }}</label
                  >
                  <input
                    type="text"
                    class="form-control text-center"
                    id="token"
                    name="token"
                    maxlength="6"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-info w-100">
                  {{ _("Enable 2FA") }}
                </button>
              </form>

              <div class="text-center mt-3">
                <a href="{{ safe_url_for('admin.admin_dashboard') }}">{{ _("Skip for now") }}</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="{{ url_for('static', filename='vendor/jsdelivr/bootstrap-5.3.0.bundle.min.js') }}"></script>
  </body>
</html>
