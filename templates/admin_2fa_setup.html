<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Настройка 2FA - HelpChain</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card">
            <div class="card-header bg-info text-white">
              <h3 class="text-center">Настройка на 2FA</h3>
            </div>
            <div class="card-body">
              <p>
                Сканирайте QR кода с вашето 2FA приложение (Google
                Authenticator, Authy и др.):
              </p>

              <div class="text-center mb-4">
                <img
                  src="data:image/png;base64,{{ qrcode }}"
                  alt="QR Code"
                  class="img-fluid"
                />
              </div>

              <p class="text-muted">
                Или въведете ръчно: <code>{{ totp_uri }}</code>
              </p>

              <form method="POST">
                <div class="mb-3">
                  <label for="token" class="form-label"
                    >Въведете кода от приложението</label
                  >
                  <input
                    type="text"
                    class="form-control text-center"
                    id="token"
                    name="token"
                    maxlength="6"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-info w-100">
                  Активирай 2FA
                </button>
              </form>

              <div class="text-center mt-3">
                <a href="{{ safe_url_for('admin.admin_dashboard') }}">Пропусни засега</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
