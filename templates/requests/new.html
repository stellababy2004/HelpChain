{% extends "base.html" %}
{% block content %}
<div class="container py-4" style="max-width: 860px;">
  <h1 class="mb-3">Nouvelle demande</h1>
  <p class="text-muted">Création d'une demande (intake).</p>

  <form method="post" action="{{ url_for('social_requests.create_request') }}">
    <div class="mb-3">
      <label class="form-label">Structure</label>
      <select class="form-select" name="structure_id" required>
        <option value="" selected disabled>Choisir une structure...</option>
        {% for s in structures %}
          <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Type de besoin</label>
        <select class="form-select" name="need_type" required>
          <option value="" selected disabled>Choisir...</option>
          {% for value, label in need_types %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Urgence</label>
        <select class="form-select" name="urgency" required>
          {% for value, label in urgencies %}
            <option value="{{ value }}" {% if value == "medium" %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="mt-3">
      <label class="form-label">Reference personne (optionnel)</label>
      <input class="form-control" name="person_ref" placeholder="Ref interne (pas de donnees sensibles)">
      <div class="form-text">Ex: "Dossier CCAS #A-2026-0042".</div>
    </div>

    <div class="mt-3">
      <label class="form-label">Description</label>
      <textarea class="form-control" name="description" rows="5" required></textarea>
    </div>

    <div class="mt-4 d-flex gap-2">
      <button class="btn btn-primary" type="submit">Creer</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('social_requests.list_requests') }}">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
