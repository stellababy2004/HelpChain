{% extends "base.html" %}
{% block content %}
<div class="container py-4" style="max-width: 860px;">
  <h1 class="mb-3">{{ _("New request") }}</h1>
  <p class="text-muted">{{ _("Create a new intake request.") }}</p>

  <form method="post" action="{{ url_for('social_requests.create_request') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label">{{ _("Structure") }}</label>
      <select class="form-select" name="structure_id" required>
        <option value="" selected disabled>{{ _("Choose a structure...") }}</option>
        {% for s in structures %}
          <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">{{ _("Need type") }}</label>
        <select class="form-select" name="need_type" required>
          <option value="" selected disabled>{{ _("Choose...") }}</option>
          {% for value, label in need_types %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">{{ _("Urgency") }}</label>
        <select class="form-select" name="urgency" required>
          {% for value, label in urgencies %}
            <option value="{{ value }}" {% if value == "medium" %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="mt-3">
      <label class="form-label">{{ _("Person reference (optional)") }}</label>
      <input class="form-control" name="person_ref" placeholder="{{ _('Internal ref (no sensitive data)') }}">
      <div class="form-text">{{ _("Example: \"CCAS file #A-2026-0042\".") }}</div>
    </div>

    <div class="mt-3">
      <label class="form-label">{{ _("Description") }}</label>
      <textarea class="form-control" name="description" rows="5" required></textarea>
    </div>

    <div class="mt-4 d-flex gap-2">
      <button class="btn btn-primary" type="submit">{{ _("Create") }}</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('social_requests.list_requests') }}">{{ _("Cancel") }}</a>
    </div>
  </form>
</div>
{% endblock %}
