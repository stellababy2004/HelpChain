<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Видео чат стая - HelpChain</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="/">HelpChain</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="{{ safe_url_for('video_chat') }}"
            >Обратно към чат</a
          >
          <a class="nav-link" href="{{ safe_url_for('logout') }}">Изход</a>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <h2>Видео чат стая</h2>

      <div class="row">
        <div class="col-md-8">
          <div class="card">
            <div class="card-body">
              <div id="video-container">
                <video id="localVideo" autoplay muted class="w-100"></video>
                <video id="remoteVideo" autoplay class="w-100 mt-3"></video>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">
            <div class="card-header">
              <h5>Чат</h5>
            </div>
            <div class="card-body">
              <div id="chat-messages" style="height: 300px; overflow-y: auto">
                <!-- Messages will appear here -->
              </div>
              <div class="input-group mt-3">
                <input
                  type="text"
                  id="messageInput"
                  class="form-control"
                  placeholder="Напиши съобщение..."
                />
                <button id="sendButton" class="btn btn-primary">Изпрати</button>
              </div>
            </div>
          </div>

          <div class="mt-3">
            <form
              method="POST"
              action="{{ url_lang('end_video_chat', session_id=session.session_id) }}"
            >
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <button type="submit" class="btn btn-danger w-100">
                Завърши чата
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Basic WebRTC setup (simplified)
      const localVideo = document.getElementById("localVideo");
      const remoteVideo = document.getElementById("remoteVideo");

      // Get user media
      navigator.mediaDevices
        .getUserMedia({ video: true, audio: true })
        .then((stream) => {
          localVideo.srcObject = stream;
          // WebRTC connection setup would go here
        })
        .catch((error) => {
          console.error("Error accessing media devices:", error);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
