<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2FA - HelpChain</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header bg-warning">
              <h3 class="text-center">Двуфакторна автентикация</h3>
            </div>
            <div class="card-body">
              <p>Въведете 6-цифрения код от вашето 2FA приложение:</p>
              <form method="POST">
                <div class="mb-3">
                  <label for="token" class="form-label">2FA Код</label>
                  <input
                    type="text"
                    class="form-control text-center"
                    id="token"
                    name="token"
                    maxlength="6"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-warning w-100">
                  Потвърди
                </button>
              </form>
              <div class="text-center mt-3">
                <a href="{{ safe_url_for('admin.admin_login') }}">Обратно</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
