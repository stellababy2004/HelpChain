<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация - HelpChain</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h3 class="text-center">Регистрация</h3>
            </div>
            <div class="card-body">
              <form method="POST">
                <div class="mb-3">
                  <label for="username" class="form-label"
                    >Потребителско име</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Имейл</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Парола</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="citizen_id" class="form-label">ЕГН</label>
                  <input
                    type="text"
                    class="form-control"
                    id="citizen_id"
                    name="citizen_id"
                  />
                </div>
                <div class="mb-3 form-check">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="is_volunteer"
                    name="is_volunteer"
                  />
                  <label class="form-check-label" for="is_volunteer"
                    >Искам да бъда доброволец</label
                  >
                </div>
                <div class="mb-3 form-check">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="is_organization"
                    name="is_organization"
                  />
                  <label class="form-check-label" for="is_organization"
                    >Представлявам организация</label
                  >
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Регистрирай се
                </button>
              </form>
              <div class="text-center mt-3">
                <a href="{{ url_for('login') }}">Вече имаш акаунт? Влез</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
