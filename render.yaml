services:
  - type: web
    name: helpchain
    env: python
    buildCommand: "pip install -r requirements.txt && cd backend && FLASK_APP=appy.py flask db upgrade"
    startCommand: "cd backend && gunicorn --bind 0.0.0.0:$PORT wsgi:application"
    region: frankfurt
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
      - key: PRODUCTION
        value: true
    databases:
      - name: helpchain-db
        databaseName: helpchain
        user: helpchain_user
        region: frankfurt
