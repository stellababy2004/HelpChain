services:
  - type: web
    name: helpchain
    env: python
    buildCommand: "pip install -r requirements.txt && cd backend && FLASK_APP=appy.py flask db upgrade"
    startCommand: "cd backend && python -c 'from appy import app; app.run(host=\"0.0.0.0\", port=int(__import__(\"os\").environ.get(\"PORT\", 10000)))'"
    region: frankfurt
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
      - key: PRODUCTION
        value: true
    databases:
      - name: helpchain-db
        databaseName: helpchain
        user: helpchain_user
        region: frankfurt
