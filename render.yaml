services:
  - type: web
    name: helpchain
    env: python
    healthCheckPath: /health
    buildCommand: "bash scripts/render_stamp_fix.sh"
    startCommand: "bash scripts/render_start.sh"
    region: frankfurt
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
      - key: PRODUCTION
        value: true
    databases:
      - name: helpchain-db
        databaseName: helpchain
        user: helpchain_user
        region: frankfurt
