services:
  - type: web
    name: helpchain
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m flask --app run:app db upgrade --directory migrations && gunicorn run:app --bind 0.0.0.0:$PORT"
    region: frankfurt
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
      - key: PRODUCTION
        value: true
    databases:
      - name: helpchain-db
        databaseName: helpchain
        user: helpchain_user
        region: frankfurt
