name: helpchain
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy=2.2.6
  - pandas=2.3.3
  - scipy=1.16.3
  - scikit-learn=1.7.2
  - opencv=4.11.0
  - joblib=1.5.2
  - pillow=12.0.0
  - blas=*=openblas
  - pip:
    # pip-managed packages will be installed from requirements-pip.txt
    # keep this empty; use pip to install the rest after creating the conda env
