global:
  resolve_timeout: 5m

route:
  receiver: slack
  group_by: ["alertname", "service", "component"]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 2h

receivers:
  - name: slack
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#helpchain-alerts"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'

templates:
  - /etc/alertmanager/templates/slack.tmpl
