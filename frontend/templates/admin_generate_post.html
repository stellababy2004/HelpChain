{% extends "base.html" %}
{% block title %}{{ _('Генериране на пост за социални мрежи') }}{% endblock %}
{% block content %}
<h2>{{ _('Генериране на пост') }}</h2>
<form id="post-form">
    <label for="topic">{{ _('Тема:') }}</label>
    <input type="text" id="topic" name="topic" class="form-control" required>
    <button type="submit" class="btn btn-primary mt-2">{{ _('Генерирай пост') }}</button>
</form>
<div id="post-result" class="mt-3"></div>
<script>
document.getElementById('post-form').onsubmit = async function(e) {
    e.preventDefault();
    const topic = document.getElementById('topic').value;
    const res = await fetch('/admin/generate_post', {
        method: 'POST',
        body: new URLSearchParams({topic}),
        headers: {'Content-Type': 'application/x-www-form-urlencoded'}
    });
    const data = await res.json();
    document.getElementById('post-result').innerText = data.post;
};
</script>
{% endblock %}
