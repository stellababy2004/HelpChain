name: OWASP ZAP Baseline

on:
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 2 * * *" # всеки ден 02:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Set target URL
        run: |
          TARGET_URL="${{ vars.ZAP_TARGET_URL }}"
          if [ -z "$TARGET_URL" ]; then
            # Default to production URL if variable not set
            TARGET_URL="https://helpchain.live"
            echo "Using default TARGET_URL: $TARGET_URL"
          fi
          echo "TARGET_URL=$TARGET_URL" >> $GITHUB_ENV

      - name: Validate target
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "Error: TARGET_URL is not set"
            exit 1
          fi
          echo "Scanning target: $TARGET_URL"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@2b5fc7f98d837319798ab7f128ea50b7d40563b6
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: .zap/rules.tsv
          cmd_options: >-
            -a
            -m 5
            -t ${{ env.TARGET_URL }}
          allow_issue_writing: false

      - name: Convert ZAP report to SARIF
        run: |
          mkdir -p zap
          # ZAP action генерира report.md и report_html.html; ще архивираме
          cp -r report.* zap/ || true

      - name: Upload ZAP artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: zap-baseline-report
          path: zap/
