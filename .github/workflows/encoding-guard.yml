name: Encoding Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  encoding-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c
        with:
          python-version: "3.12"
      - run: python scripts/encoding_guard.py

