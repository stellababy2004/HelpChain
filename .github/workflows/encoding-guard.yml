name: Encoding Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  encoding-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/encoding_guard.py
