name: Secrets Rotation

on:
  schedule:
    - cron: "0 9 1 */3 *" # 1st day of every 3rd month at 09:00 UTC
  workflow_dispatch:
    inputs:
      force_rotate:
        description: "Force immediate rotation"
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  check-rotation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_rotate: ${{ steps.check.outputs.should_rotate }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Check rotation schedule
        id: check
        run: |
          if [ "${{ github.event.inputs.force_rotate }}" = "true" ]; then
            echo "should_rotate=true" >> $GITHUB_OUTPUT
            echo "🔄 Force rotation requested"
          elif [ ! -f ".last_rotation" ]; then
            echo "should_rotate=true" >> $GITHUB_OUTPUT
            echo "🔄 No previous rotation found - initial rotation needed"
          else
            LAST_ROTATION=$(cat .last_rotation)
            DAYS_SINCE=$(($(date +%s) - $(date -d "$LAST_ROTATION" +%s)))
            DAYS_SINCE=$((DAYS_SINCE / 86400))

            if [ $DAYS_SINCE -ge 90 ]; then
              echo "should_rotate=true" >> $GITHUB_OUTPUT
              echo "🔄 Rotation due (last: $DAYS_SINCE days ago)"
            else
              echo "should_rotate=false" >> $GITHUB_OUTPUT
              echo "⏰ Rotation not due yet ($DAYS_SINCE/90 days)"
            fi
          fi

  rotate-secrets:
    runs-on: ubuntu-latest
    needs: check-rotation
    if: needs.check-rotation.outputs.should_rotate == 'true'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.11"

      - name: Run secrets rotation
        run: |
          python rotate_secrets.py --force

      - name: Create rotation PR
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🔐 Rotate application secrets"
          title: "🔐 Automated Secrets Rotation"
          body: |
            ## 🔐 Automated Secrets Rotation

            This PR contains rotated secrets for enhanced security.

            ### Changes:
            - `SECRET_KEY` - Regenerated
            - API keys - Regenerated where applicable

            ### Verification Steps:
            1. Review that secrets are properly masked in logs
            2. Test application functionality
            3. Verify external service integrations still work

            ### Security Notes:
            - Old secrets are backed up in commit history
            - Rotation follows 90-day schedule
            - Manual review required before merge

            ---
            *This PR was automatically created by secrets rotation workflow*
          branch: automated/secrets-rotation
          delete-branch: true
          labels: |
            security
            automated
          assignees: stellababy2004

  notify-rotation:
    runs-on: ubuntu-latest
    needs: [check-rotation, rotate-secrets]
    if: needs.check-rotation.outputs.should_rotate == 'true' && needs.rotate-secrets.result == 'success'
    timeout-minutes: 5
    steps:
      - name: Create rotation notification issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔐 Secrets Rotation Completed',
              body: `
            ## 🔐 Secrets Rotation Notification

            Automated secrets rotation has been completed successfully.

            ### What Happened:
            - Application secrets were rotated
            - Pull request created for review and deployment
            - Backup of old secrets created

            ### Next Steps:
            1. **Review PR**: Check the automated PR for rotated secrets
            2. **Test Application**: Verify functionality with new secrets
            3. **Update External Services**: Update any external integrations with new API keys
            4. **Deploy**: Merge and deploy the changes
            5. **Monitor**: Watch for authentication issues post-deployment

            ### Security Reminder:
            - Old secrets remain in git history for rollback if needed
            - External services may need manual key updates
            - Monitor application logs for authentication failures

            ---
            *This notification was automatically created by secrets rotation workflow*
            `,
              labels: ['security', 'notification', 'secrets']
            })
