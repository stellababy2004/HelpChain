name: Guard - Pin GitHub Actions
on:
  pull_request:
    paths: [".github/workflows/**"]
  push:
    branches: ["main"]
    paths: [".github/workflows/**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pin-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Fail on problematic version tags
        run: |
          set -euo pipefail
          PROBLEMATIC_TAGS=$(grep -RHEn "^\s*-\s*uses:\s*(actions/checkout@v[0-9]|aquasecurity/trivy-action@master|github/codeql-action/upload-sarif@v[0-9])" .github/workflows backend/.github/workflows || true)
          if [ -n "$PROBLEMATIC_TAGS" ]; then
            echo "❌ Found problematic version tags that must be pinned to SHAs:"
            echo "$PROBLEMATIC_TAGS"
            echo "Replace with:"
            echo "actions/checkout@v4 -> actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683"
            echo "aquasecurity/trivy-action@master -> aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8"
            echo "github/codeql-action/upload-sarif@v3 -> github/codeql-action/upload-sarif@be1102e4461872bb6506cd26561a31b56671ace0"
            exit 1
          else
            echo "✅ No problematic version tags found."
          fi
      - name: Require 40-char SHAs
        run: |
          set -euo pipefail
          # Разрешаваме локални/relative actions (./) и composite без @
          NOT_SHA=$(grep -RHEn "^\s*-\s*uses:\s*[^./][^@]+@[^[:space:]]+" .github/workflows backend/.github/workflows \
            | grep -vE "@[a-f0-9]{40}$" || true)
          if [ -n "$NOT_SHA" ]; then
            echo "❌ Some actions are not pinned to a 40-char SHA:"
            echo "$NOT_SHA"
            exit 1
          else
            echo "✅ All external actions pinned to SHAs."
          fi
