name: Migration Guard v3

on:
  push:
    paths:
      - "migrations/**"
      - "scripts/migration_guard_v3.py"

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - run: pip install flask alembic sqlalchemy

      - run: python scripts/migration_guard_v3.py
