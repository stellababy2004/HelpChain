name: Trivy Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 4 * * *" # Всеки ден 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-iac:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Trivy IaC Scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-iac-results.sarif"

      - name: Upload Trivy IaC SARIF
        uses: github/codeql-action/upload-sarif@be1102e4461872bb6506cd26561a31b56671ace0
        if: always()
        with:
          sarif_file: "trivy-iac-results.sarif"

  trivy-repo:
    name: Trivy Repository Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Trivy Repository Scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-repo-results.sarif"
          skip-dirs: "node_modules,.git,.venv,venv,__pycache__,.pytest_cache"

      - name: Upload Trivy Repo SARIF
        uses: github/codeql-action/upload-sarif@be1102e4461872bb6506cd26561a31b56671ace0
        if: always()
        with:
          sarif_file: "trivy-repo-results.sarif"
