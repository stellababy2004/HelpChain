name: Singleton DB fast-fail

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  singleton-db-check:
    name: Verify single SQLAlchemy instance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest flask_sqlalchemy sqlalchemy
      - name: Run singleton test
        run: |
          pytest -q tests/test_sqlalchemy_singleton.py -q
