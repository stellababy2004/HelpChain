
name: Preview Smoke Checks
on:
  push:
    branches:
      - main
      - vercel-setup-health
  pull_request:
    branches:
      - main
      - vercel-setup-health
  workflow_dispatch:
    inputs:
      base_url:
        description: "Preview base URL (e.g., https://helpchain-preview.vercel.app)"
        required: true
        type: string
jobs:
  smoke:
    if: false
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      BYPASS_TOKEN: ${{ secrets.BYPASS_TOKEN }}
      PROJECT_PREFIX: helpchainlive
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Ensure jq is available
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Find latest READY preview URL
        id: geturl
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "VERCEL_TOKEN secret is missing" >&2
            exit 1
          fi
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          echo "Looking for READY preview on branch: $branch"
          resp=$(curl -fsSL -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v6/deployments?limit=20")
          url=$(echo "$resp" | jq -r --arg p "$PROJECT_PREFIX" --arg b "$branch" '
            [.deployments[]
              | select(.name|startswith($p))
              | select(.state=="READY")
              | select((.meta.githubCommitRef // .meta.gitlabCommitRef // .meta.bitbucketCommitRef // "") == $b)
            ] | if length>0 then .[0].url else null end')
          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "No READY preview found for prefix $PROJECT_PREFIX" >&2
            echo "$resp" | jq -r '.deployments | map({name,state,url})'
            exit 1
          fi
          echo "Preview URL: https://$url"
          echo "url=https://$url" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
      - name: Version check (/api/_version + /health header)
        shell: bash
        run: |
          set -euo pipefail
          base='${{ steps.geturl.outputs.url }}'
          expected_sha='${{ github.sha }}'
          ver_json=$(curl -fsSL -H "x-vercel-protection-bypass: $BYPASS_TOKEN" "$base/api/_version")
          echo "Version JSON: $ver_json"
          commit=$(echo "$ver_json" | jq -r '.commit // ""')
          branch=$(echo "$ver_json" | jq -r '.branch // ""')
          time=$(echo "$ver_json" | jq -r '.time // ""')
          if [ -z "$commit" ] || [ -z "$branch" ] || [ -z "$time" ]; then
            echo "Missing fields in /api/_version (commit/branch/time)" >&2
            exit 1
          fi
          wf_branch='${{ steps.geturl.outputs.branch }}'
          if [ -n "$wf_branch" ] && [ "$branch" != "$wf_branch" ]; then
            echo "Branch mismatch: /api/_version=$branch vs workflow=$wf_branch" >&2
            exit 1
          fi
          headers=$(curl -fsSL -D - -o /dev/null -H "x-vercel-protection-bypass: $BYPASS_TOKEN" "$base/health")
          echo "$headers"
          header_commit=$(echo "$headers" | awk -F': ' 'tolower($1)=="x-app-commit" {gsub(/\r/,"",$2); print $2}' | tail -n1)
          if [ -z "$header_commit" ]; then
            echo "X-App-Commit header missing on /health" >&2
            exit 1
          fi
          if [ "$header_commit" != "$commit" ]; then
            echo "Commit mismatch: /api/_version=$commit vs /health header=$header_commit" >&2
            exit 1
          fi
          if [ -n "$expected_sha" ]; then
            short12=${expected_sha:0:12}
            short7=${expected_sha:0:7}
            if [ "$commit" != "$expected_sha" ] && [ "$commit" != "$short12" ] && [ "$commit" != "$short7" ]; then
              echo "Commit mismatch vs workflow SHA: version=$commit expected=$expected_sha" >&2
              exit 1
            fi
          fi
      - name: Health check (/api/_health)
        shell: bash
        run: |
          set -euo pipefail
          base='${{ steps.geturl.outputs.url }}'
          if [ -z "${BYPASS_TOKEN:-}" ]; then
            echo "BYPASS_TOKEN secret is missing" >&2
            exit 1
          fi
          body=$(curl -fsSL -H "x-vercel-protection-bypass: $BYPASS_TOKEN" "$base/api/_health")
          echo "Body: $body"
          [ "$body" = "ok" ]
      - name: Root check (/)
        shell: bash
        run: |
          set -euo pipefail
          base='${{ steps.geturl.outputs.url }}'
          code=$(curl -fsSL -o /dev/null -w "%{http_code}" -H "x-vercel-protection-bypass: $BYPASS_TOKEN" "$base")
          echo "HTTP $code"
          [ "$code" = "200" ]
      - name: Admin strict smoke (preview)
        shell: pwsh
        run: |
          $base = '${{ steps.geturl.outputs.url }}'
          pwsh -File scripts/admin-smoke.ps1 -BaseUrl $base -Strict -BypassToken $env:BYPASS_TOKEN
