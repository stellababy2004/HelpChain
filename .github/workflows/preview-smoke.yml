name: Preview Smoke Checks

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL of deployed preview (e.g., https://helpchain-preview.vercel.app)"
        required: false
        type: string
  pull_request:
    branches:
      - main
      - vercel-setup-health

jobs:
  prebuilt-size-guard:
    # Only run if vercel.json exists (indicates Vercel project)
    if: ${{ hashFiles('vercel.json') != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Vercel CLI
        run: npm install --global vercel@^33

      - name: Build prebuilt output
        env:
          # Optional: pick up .env if needed via Vercel; build generally works offline
          VERCEL_TELEMETRY_DISABLED: '1'
        run: |
          # Build with local config to produce .vercel/output
          npx vercel build --yes

      - name: Check .vercel/output size
        run: |
          set -e
          if [ ! -d .vercel/output ]; then
            echo ".vercel/output not found; ensure vercel build succeeded." >&2
            exit 1
          fi
          du -sh .vercel/output || true
          find .vercel/output -type f -size +100M -exec ls -lh {} \; || true
          total=$(du -sb .vercel/output | awk '{print $1}' || echo 0)
          # 3758096384 bytes == 3.5 GiB
          if [ "$total" -gt 3758096384 ]; then
            echo "Prebuilt output too large: $total bytes" >&2
            exit 1
          fi
          echo "Prebuilt size OK: $total bytes"

  local-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Start server (background)
        shell: pwsh
        run: |
          $job = Start-Job -ScriptBlock { python start_server.py }
          echo "Started background job: $($job.Id)"
          echo "::set-output name=jobId::$($job.Id)"
        id: start

      - name: Health check
        shell: pwsh
        run: |
          $base = "http://127.0.0.1:5000"
          $ok = $false
          for ($i=0; $i -lt 40; $i++) {
            Start-Sleep -Milliseconds 500
            try {
              $r = Invoke-WebRequest -Uri "$base/health" -TimeoutSec 3 -ErrorAction Stop
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
          }
          if (-not $ok) { throw "Health failed" }

      - name: Admin smoke
        shell: pwsh
        run: pwsh -File scripts/admin-smoke.ps1 -Port 5000

      - name: Submit-request E2E smoke
        shell: pwsh
        run: pwsh -File scripts/e2e-submit-request-smoke.ps1 -Port 5000

      - name: Stop server
        if: always()
        shell: pwsh
        run: |
          Get-Job | Stop-Job -Force
          Get-Job | Receive-Job -Keep

  remote-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Admin smoke (preview)
        shell: pwsh
        run: pwsh -File scripts/admin-smoke.ps1 -BaseUrl "${{ inputs.base_url }}"

      - name: Submit-request smoke (preview)
        shell: pwsh
        run: pwsh -File scripts/e2e-submit-request-smoke.ps1 -BaseUrl "${{ inputs.base_url }}"
