name: Preview Smoke Checks

on:
  push:
    branches: [ main, vercel-setup-health ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      BYPASS_TOKEN: ${{ secrets.BYPASS_TOKEN }}
      PROJECT_PREFIX: helpchainlive
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure jq is available
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Find latest READY preview URL
        id: geturl
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "VERCEL_TOKEN secret is missing" >&2
            exit 1
          fi
          # Fetch latest deployments and pick first READY matching project prefix
          resp=$(curl -fsSL -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v6/deployments?limit=20")
          url=$(echo "$resp" | jq -r --arg p "$PROJECT_PREFIX" '[.deployments[] | select(.name|startswith($p)) | select(.state=="READY")] | if length>0 then .[0].url else null end')
          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "No READY preview found for prefix $PROJECT_PREFIX" >&2
            echo "$resp" | jq -r '.deployments | map({name,state,url})'
            exit 1
          fi
          echo "Preview URL: https://$url"
          echo "url=https://$url" >> "$GITHUB_OUTPUT"

      - name: Version check (/api/_version + /health header)
        shell: bash
        run: |
          set -euo pipefail
          base='${{ steps.geturl.outputs.url }}'
          # Fetch version JSON
          ver_json=$(curl -fsSL -H "x-vercel-protection-bypass: $BYPASS_TOKEN" "$base/api/_version")
          echo "Version JSON: $ver_json"
          commit=$(echo "$ver_json" | jq -r '.commit // ""')
          branch=$(echo "$ver_json" | jq -r '.branch // ""')
          time=$(echo "$ver_json" | jq -r '.time // ""')
          if [ -z "$commit" ] || [ -z "$branch" ] || [ -z "$time" ]; then
            echo "Missing fields in /api/_version (commit/branch/time)" >&2
            exit 1
          fi
          # Fetch /health headers and compare X-App-Commit
          headers=$(curl -fsSL -D - -o /dev/null -H "x-vercel-protection-bypass: $BYPASS_TOKEN" "$base/health")
          echo "$headers"
          header_commit=$(echo "$headers" | awk -F': ' 'tolower($1)=="x-app-commit" {gsub(/\r/,"",$2); print $2}' | tail -n1)
          if [ -z "$header_commit" ]; then
            echo "X-App-Commit header missing on /health" >&2
            exit 1
          fi
          if [ "$header_commit" != "$commit" ]; then
            echo "Commit mismatch: /api/_version=$commit vs /health header=$header_commit" >&2
            exit 1
          fi

      - name: Health check (/api/_health)
        shell: bash
        run: |
          set -euo pipefail
          base='${{ steps.geturl.outputs.url }}'
          if [ -z "${BYPASS_TOKEN:-}" ]; then
            echo "BYPASS_TOKEN secret is missing" >&2
            exit 1
          fi
          body=$(curl -fsSL -H "x-vercel-protection-bypass: $BYPASS_TOKEN" "$base/api/_health")
          echo "Body: $body"
          [ "$body" = "ok" ]

      - name: Root check (/)
        shell: bash
        run: |
          set -euo pipefail
          base='${{ steps.geturl.outputs.url }}'
          code=$(curl -fsSL -o /dev/null -w "%{http_code}" -H "x-vercel-protection-bypass: $BYPASS_TOKEN" "$base")
          echo "HTTP $code"
          [ "$code" = "200" ]

      - name: Admin strict smoke (preview)
        shell: pwsh
        run: |
          $base = '${{ steps.geturl.outputs.url }}'
          pwsh -File scripts/admin-smoke.ps1 -BaseUrl $base -Strict -BypassToken $env:BYPASS_TOKEN
name: Preview Smoke Checks

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL of deployed preview (e.g., https://helpchain-preview.vercel.app)"
        required: false
        type: string
  pull_request:
    branches:
      - main
      - vercel-setup-health

jobs:
  prebuilt-size-guard:
    # Only run if vercel.json exists (indicates Vercel project)
    if: ${{ hashFiles('vercel.json') != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Vercel CLI
        run: npm install --global vercel@^33

      - name: Build prebuilt output
        env:
          # Optional: pick up .env if needed via Vercel; build generally works offline
          VERCEL_TELEMETRY_DISABLED: '1'
        run: |
          # Build with local config to produce .vercel/output
          npx vercel build --yes

      - name: Check .vercel/output size
        run: |
          set -e
          if [ ! -d .vercel/output ]; then
            echo ".vercel/output not found; ensure vercel build succeeded." >&2
            exit 1
          fi
          du -sh .vercel/output || true
          find .vercel/output -type f -size +100M -exec ls -lh {} \; || true
          total=$(du -sb .vercel/output | awk '{print $1}' || echo 0)
          # 3758096384 bytes == 3.5 GiB
          if [ "$total" -gt 3758096384 ]; then
            echo "Prebuilt output too large: $total bytes" >&2
            exit 1
          fi
          echo "Prebuilt size OK: $total bytes"

  local-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Start server (background)
        shell: pwsh
        run: |
          $job = Start-Job -ScriptBlock { python start_server.py }
          echo "Started background job: $($job.Id)"
          echo "::set-output name=jobId::$($job.Id)"
        id: start

      - name: Health check
        shell: pwsh
        run: |
          $base = "http://127.0.0.1:5000"
          $ok = $false
          for ($i=0; $i -lt 40; $i++) {
            Start-Sleep -Milliseconds 500
            try {
              $r = Invoke-WebRequest -Uri "$base/health" -TimeoutSec 3 -ErrorAction Stop
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
          }
          if (-not $ok) { throw "Health failed" }

      - name: Admin smoke
        shell: pwsh
        run: pwsh -File scripts/admin-smoke.ps1 -Port 5000

      - name: Submit-request E2E smoke
        shell: pwsh
        run: pwsh -File scripts/e2e-submit-request-smoke.ps1 -Port 5000

      - name: Stop server
        if: always()
        shell: pwsh
        run: |
          Get-Job | Stop-Job -Force
          Get-Job | Receive-Job -Keep

  remote-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure jq is available
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Version check (/api/_version + /health header)
        shell: bash
        run: |
          set -euo pipefail
          base='${{ inputs.base_url }}'
          ver_json=$(curl -fsSL "$base/api/_version")
          echo "Version JSON: $ver_json"
          commit=$(echo "$ver_json" | jq -r '.commit // ""')
          branch=$(echo "$ver_json" | jq -r '.branch // ""')
          time=$(echo "$ver_json" | jq -r '.time // ""')
          if [ -z "$commit" ] || [ -z "$branch" ] || [ -z "$time" ]; then
            echo "Missing fields in /api/_version (commit/branch/time)" >&2
            exit 1
          fi
          headers=$(curl -fsSL -D - -o /dev/null "$base/health")
          echo "$headers"
          header_commit=$(echo "$headers" | awk -F': ' 'tolower($1)=="x-app-commit" {gsub(/\r/,"",$2); print $2}' | tail -n1)
          if [ -z "$header_commit" ]; then
            echo "X-App-Commit header missing on /health" >&2
            exit 1
          fi
          if [ "$header_commit" != "$commit" ]; then
            echo "Commit mismatch: /api/_version=$commit vs /health header=$header_commit" >&2
            exit 1
          fi

      - name: Admin smoke (preview)
        shell: pwsh
        run: pwsh -File scripts/admin-smoke.ps1 -BaseUrl "${{ inputs.base_url }}"

      - name: Submit-request smoke (preview)
        shell: pwsh
        run: pwsh -File scripts/e2e-submit-request-smoke.ps1 -BaseUrl "${{ inputs.base_url }}"
