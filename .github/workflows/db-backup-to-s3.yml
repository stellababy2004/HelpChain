name: DB Backup to S3 (Neon Postgres)

on:
  workflow_dispatch:
  schedule:
    # Daily backup at 02:05 UTC
    - cron: "5 2 * * *"

permissions:
  contents: read

concurrency:
  group: db-backup-to-s3
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Prepare PostgreSQL client (Docker postgres:17)
        shell: bash
        run: |
          set -euo pipefail
          docker pull postgres:17
          docker run --rm postgres:17 pg_dump --version

      - name: Validate AWS secrets format (safe preflight)
        shell: bash
        env:
          AWS_ACCESS_KEY_ID_RAW: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_RAW: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION_RAW: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail

          if [[ -z "${AWS_ACCESS_KEY_ID_RAW:-}" || -z "${AWS_SECRET_ACCESS_KEY_RAW:-}" || -z "${AWS_REGION_RAW:-}" ]]; then
            echo "Missing one of required secrets: AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION"
            exit 1
          fi

          if [[ ! "${AWS_ACCESS_KEY_ID_RAW}" =~ ^(AKIA|ASIA)[A-Z0-9]{16}$ ]]; then
            echo "AWS_ACCESS_KEY_ID format looks invalid (expected AKIA... or ASIA..., no quotes/spaces)."
            echo "Also verify AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are not swapped."
            exit 1
          fi

          if [[ "${AWS_SECRET_ACCESS_KEY_RAW}" =~ ^(AKIA|ASIA)[A-Z0-9]{16}$ ]]; then
            echo "AWS_SECRET_ACCESS_KEY looks like an Access Key ID. Secrets are likely swapped."
            exit 1
          fi

          if [[ "${AWS_REGION_RAW}" =~ [[:space:]\"] ]]; then
            echo "AWS_REGION contains spaces or quotes. Use plain value like eu-west-3."
            exit 1
          fi

          if [[ "${AWS_ACCESS_KEY_ID_RAW}" =~ ^ASIA ]] && [[ -z "${AWS_SESSION_TOKEN:-}" ]]; then
            echo "AWS_ACCESS_KEY_ID is temporary (ASIA...), but no AWS_SESSION_TOKEN is configured."
            echo "Use long-lived IAM user keys (AKIA...) or add AWS_SESSION_TOKEN support."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create pg_dump (gzip)
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          set -euo pipefail

          if [[ -z "${DATABASE_URL:-}" ]]; then
            echo "Missing secret NEON_DATABASE_URL"
            exit 1
          fi

          ts="$(date -u +'%Y%m%dT%H%M%SZ')"
          out="helpchain_prod_${ts}.sql.gz"

          echo "Creating backup: ${out}"

          # Add sslmode=require only if missing, while preserving existing query params.
          DUMP_URL="${DATABASE_URL}"

          # Some pg_dump/libpq builds in GitHub runners choke on Neon's channel_binding query param.
          # Remove it for backup connections (TLS is still enforced via sslmode=require).
          DUMP_URL="${DUMP_URL//&channel_binding=require/}"
          DUMP_URL="${DUMP_URL//channel_binding=require&/}"
          DUMP_URL="${DUMP_URL//\?channel_binding=require/?}"
          if [[ "${DUMP_URL}" != *"sslmode="* ]]; then
            if [[ "${DUMP_URL}" == *"?"* ]]; then
              DUMP_URL="${DUMP_URL}&sslmode=require"
            else
              DUMP_URL="${DUMP_URL}?sslmode=require"
            fi
          fi

          # Cleanup a possible trailing ? or accidental ?&
          DUMP_URL="${DUMP_URL/%\?}"
          DUMP_URL="${DUMP_URL//\?&/?}"

          # Run pg_dump from postgres:17 container to match Neon PG major version.
          docker run --rm \
            -e DUMP_URL="${DUMP_URL}" \
            postgres:17 \
            bash -lc 'pg_dump "$DUMP_URL" --no-owner --no-privileges' \
            | gzip -9 > "${out}"

          echo "Backup size:"
          ls -lh "${out}"

          echo "OUT_FILE=${out}" >> "$GITHUB_ENV"
          echo "OUT_SHA256_FILE=${out}.sha256" >> "$GITHUB_ENV"
          echo "OUT_MANIFEST_FILE=${out}.manifest.json" >> "$GITHUB_ENV"
          echo "S3_KEY=postgres/${out}" >> "$GITHUB_ENV"
          echo "S3_KEY_SHA256=postgres/${out}.sha256" >> "$GITHUB_ENV"
          echo "S3_KEY_MANIFEST=postgres/${out}.manifest.json" >> "$GITHUB_ENV"

      - name: Generate checksum and metadata manifest
        shell: bash
        run: |
          set -euo pipefail

          sha256="$(sha256sum "${OUT_FILE}" | awk '{print $1}')"
          size_bytes="$(wc -c < "${OUT_FILE}" | tr -d '[:space:]')"
          generated_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          printf '%s  %s\n' "${sha256}" "$(basename "${OUT_FILE}")" > "${OUT_SHA256_FILE}"

          cat > "${OUT_MANIFEST_FILE}" <<JSON
          {
            "backup_file": "$(basename "${OUT_FILE}")",
            "sha256": "${sha256}",
            "size_bytes": ${size_bytes},
            "generated_at_utc": "${generated_at}",
            "source": "Neon Postgres",
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "repository": "${GITHUB_REPOSITORY}",
            "git_sha": "${GITHUB_SHA}",
            "s3_key_backup": "${S3_KEY}",
            "s3_key_checksum": "${S3_KEY_SHA256}",
            "s3_key_manifest": "${S3_KEY_MANIFEST}"
          }
          JSON

          echo "Checksum and manifest generated:"
          ls -lh "${OUT_SHA256_FILE}" "${OUT_MANIFEST_FILE}"

      - name: Upload to S3
        shell: bash
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          set -euo pipefail
          if [[ -z "${S3_BUCKET:-}" ]]; then
            echo "Missing secret S3_BUCKET"
            exit 1
          fi

          aws s3 cp "${OUT_FILE}" "s3://${S3_BUCKET}/${S3_KEY}" \
            --only-show-errors

          aws s3 cp "${OUT_SHA256_FILE}" "s3://${S3_BUCKET}/${S3_KEY_SHA256}" \
            --only-show-errors

          aws s3 cp "${OUT_MANIFEST_FILE}" "s3://${S3_BUCKET}/${S3_KEY_MANIFEST}" \
            --only-show-errors

          echo "Uploaded to s3://${S3_BUCKET}/${S3_KEY}"
          echo "Uploaded checksum to s3://${S3_BUCKET}/${S3_KEY_SHA256}"
          echo "Uploaded manifest to s3://${S3_BUCKET}/${S3_KEY_MANIFEST}"

      - name: Retention fallback (keep last 30 daily backups)
        shell: bash
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          set -euo pipefail

          # Keep newest 30 *.sql.gz objects under postgres/ as a fallback.
          # Primary policy should be an S3 lifecycle rule with 30-day expiry.
          mapfile -t all_keys < <(aws s3api list-objects-v2 \
            --bucket "${S3_BUCKET}" \
            --prefix "postgres/helpchain_prod_" \
            --query 'reverse(sort_by(Contents,&LastModified))[*].Key' \
            --output text)

          keys=()
          for k in "${all_keys[@]}"; do
            if [[ "${k}" == *.sql.gz ]]; then
              keys+=("${k}")
            fi
          done

          keep=30
          count=${#keys[@]}
          echo "Found ${count} backups"

          if (( count <= keep )); then
            echo "Nothing to delete (<= ${keep})"
            exit 0
          fi

          echo "Deleting old backups (keeping newest ${keep})..."
          for (( i=keep; i<count; i++ )); do
            k="${keys[$i]}"
            echo "Deleting: ${k}"
            aws s3api delete-object --bucket "${S3_BUCKET}" --key "${k}" >/dev/null
            aws s3api delete-object --bucket "${S3_BUCKET}" --key "${k}.sha256" >/dev/null || true
            aws s3api delete-object --bucket "${S3_BUCKET}" --key "${k}.manifest.json" >/dev/null || true
          done

      - name: Done
        run: echo "Backup completed successfully."
