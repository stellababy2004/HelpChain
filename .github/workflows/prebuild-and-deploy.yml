name: Prebuild and Deploy to Vercel (prebuilt)

on:
  push:
    branches:
      - main
      - chore/vercel-ignore-extra
  pull_request:
    branches:
      - main

jobs:
  prebuild:
    name: Prebuild on GitHub runner (create .vercel/output)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies (wheelhouse)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            echo "Installing requirements.txt (slimmed root requirements)"
            pip install --prefer-binary -r requirements.txt
          elif [ -f backend/requirements.txt ]; then
            echo "Installing backend/requirements.txt (slim runtime deps)"
            pip install --prefer-binary -r backend/requirements.txt
          elif [ -f requirements-dev-minimal.txt ]; then
            echo "Installing requirements-dev-minimal.txt"
            pip install --prefer-binary -r requirements-dev-minimal.txt
          fi

      - name: Install Vercel CLI
        run: |
          npm install -g vercel@latest

      - name: Run Vercel build (create .vercel/output)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel@latest pull --yes --token "$VERCEL_TOKEN" || true
          npx vercel@latest build --token "$VERCEL_TOKEN"

      - name: Verify prebuilt output
        run: |
          if [ -d .vercel/output ]; then
            echo ".vercel/output exists"
            ls -la .vercel/output || true
          else
            echo "No .vercel/output found - failing early for debug"
            ls -la || true
            exit 1
          fi

      - name: Cleanup large files from .vercel/output
        if: always()
        run: |
          echo "Listing files in .vercel/output larger than 100MB (will remove)"
          find .vercel/output -type f -size +100M -print0 | xargs -0 du -b 2>/dev/null | sort -nr | tee large-files-to-remove.txt || true
          if [ -s large-files-to-remove.txt ]; then
            echo "Removing files >100MB from .vercel/output"
            find .vercel/output -type f -size +100M -print0 | xargs -0 rm -v || true
          else
            echo "No large files >100MB found in .vercel/output"
          fi

      - name: Create compressed artifact of .vercel/output
        if: always()
        run: |
          echo "Creating compressed archive output.tgz..."
          tar -C .vercel -czf output.tgz output || true

      - name: Upload .vercel/output artifact
        uses: actions/upload-artifact@v4
        with:
          name: vercel-output
          path: .vercel/output

  check-functions:
    name: Check Vercel function sizes
    needs: prebuild
    uses: ./.github/workflows/check-function-sizes.yml
    with:
      max_size_mb: 250
      # Artifact name to download inside reusable workflow
      # Note: check-function-sizes.yml will download artifact 'vercel-output' if present
      artifact_name: vercel-output

  deploy:
    name: Deploy prebuilt output to Vercel (preview)
    needs: check-functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download .vercel/output artifact
        uses: actions/download-artifact@v4
        with:
          name: vercel-output
          path: .vercel/output

      - name: Install Vercel CLI
        run: |
          npm install -g vercel@latest

      - name: Deploy prebuilt output to Vercel (preview)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel@latest deploy --prebuilt --token "$VERCEL_TOKEN" --yes --archive=tgz

