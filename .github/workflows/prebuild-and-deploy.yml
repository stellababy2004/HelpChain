name: Prebuild and Deploy to Vercel (prebuilt)

on:
  push:
    branches:
      - main
      - chore/vercel-ignore-extra
  pull_request:
    branches:
      - main

jobs:
  prebuild:
    name: Prebuild on GitHub runner (create .vercel/output)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies (wheelhouse)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            echo "Installing requirements.txt (slimmed root requirements)"
            pip install --prefer-binary -r requirements.txt
          elif [ -f backend/requirements.txt ]; then
            echo "Installing backend/requirements.txt (slim runtime deps)"
            pip install --prefer-binary -r backend/requirements.txt
          elif [ -f requirements-dev-minimal.txt ]; then
            echo "Installing requirements-dev-minimal.txt"
            pip install --prefer-binary -r requirements-dev-minimal.txt
          fi

      - name: Install Vercel CLI
        run: |
          npm install -g vercel@latest

      - name: Ensure expected vendored python paths exist
        if: always()
        run: |
          set -euo pipefail
          # create placeholder for _pytest if referenced in .vercel output (after artifact extraction)
          if [ -d ".vercel/output" ] || [ -d ".vercel/python" ]; then
            # If any diagnostics or build files reference _vendor/_pytest, create a minimal placeholder
            if grep -R --line-number "_vendor/_pytest" .vercel/output 2>/dev/null | grep -q .; then
              mkdir -p .vercel/python/py3.12/backend/_vendor/_pytest
              touch .vercel/python/py3.12/backend/_vendor/_pytest/__init__.py
            fi
          fi

      - name: Ensure expected vendored python paths exist
        if: always()
        run: |
          set -euo pipefail
          # create placeholder for _pytest if referenced in .vercel output
          if [ -d ".vercel/output" ] || [ -d ".vercel/python" ]; then
            if grep -R --line-number "_vendor/_pytest" .vercel/output 2>/dev/null | grep -q .; then
              mkdir -p .vercel/python/py3.12/backend/_vendor/_pytest
              touch .vercel/python/py3.12/backend/_vendor/_pytest/__init__.py
            fi
          fi

      - name: Run Vercel build (create .vercel/output)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel@latest pull --yes --token "$VERCEL_TOKEN" || true
          npx vercel@latest build --token "$VERCEL_TOKEN"

      - name: Verify prebuilt output
        run: |
          if [ -d .vercel/output ]; then
            echo ".vercel/output exists"
            ls -la .vercel/output || true
          else
            echo "No .vercel/output found - failing early for debug"
            ls -la || true
            exit 1
          fi

      - name: Cleanup large files from .vercel/output
        if: always()
        run: |
          echo "Listing files in .vercel/output larger than 100MB (will remove)"
          find .vercel/output -type f -size +100M -print0 | xargs -0 du -b 2>/dev/null | sort -nr | tee large-files-to-remove.txt || true
          if [ -s large-files-to-remove.txt ]; then
            echo "Removing files >100MB from .vercel/output"
            find .vercel/output -type f -size +100M -print0 | xargs -0 rm -v || true
          else
            echo "No large files >100MB found in .vercel/output"
          fi

      - name: Create compressed artifact of .vercel/output
        if: always()
        run: |
          echo "Creating compressed archive output.tgz..."
          tar -C .vercel -czf output.tgz output || true

      - name: Local function size check
        if: always()
        run: |
          MAX_SIZE_MB=250
          echo "Generating function size listing..."
          du -ah .vercel/output 2>/dev/null | sort -rh | head -n 200 > function-size-listing.txt || true

          echo "Function sizes (MB):" > function-sizes.txt
          FOUND=0
          if [ -d .vercel/output/functions ]; then
            for d in .vercel/output/functions/*; do
              if [ -d "$d" ]; then
                sz_bytes=$(du -sb "$d" | awk '{print $1}')
                sz_mb=$((sz_bytes / 1024 / 1024))
                echo "$sz_mb $d" >> function-sizes.txt
                if [ "$sz_mb" -gt "$MAX_SIZE_MB" ]; then
                  echo "ERROR: Function too large: $d (${sz_mb}MB) > ${MAX_SIZE_MB}MB" >&2
                  FOUND=1
                fi
              fi
            done
          else
            echo ".vercel/output/functions not found; no functions to check." >> function-sizes.txt
          fi

          cat function-sizes.txt
          if [ "$FOUND" -eq 1 ]; then
            echo "One or more functions exceed ${MAX_SIZE_MB}MB. Failing prebuild." >&2
            exit 1
          fi

      - name: Upload function-size diagnostics
        if: always()
        uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9392
        with:
          name: function-sizes
          path: |
            function-size-listing.txt
            function-sizes.txt

      - name: Upload .vercel/output artifact
        uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9392
        with:
          name: vercel-output
          path: .vercel/output

  deploy:
    name: Deploy prebuilt output to Vercel (preview)
    needs: prebuild
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download `vercel-output` artifact via GitHub API (no marketplace action)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Attempting to download artifact 'vercel-output' via gh API"
          ART_ID=$(gh api repos/${{ github.repository }}/actions/artifacts --jq '.artifacts[] | select(.name=="vercel-output") | .id' | head -n1 || true)
          if [ -z "$ART_ID" ]; then
            echo "Artifact 'vercel-output' not found - continuing (prebuild may have failed)"
          else
            echo "Found artifact id: $ART_ID"
            echo "Downloading artifact via curl (avoids gh --output flag incompatibility)"
            curl -sSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ART_ID/zip" -o vercel-output.zip || true
            mkdir -p .vercel
            TMPDIR=$(mktemp -d)
            unzip -q vercel-output.zip -d "$TMPDIR" || true

            # Robust extraction logic:
            # 1) If archive contains a nested .vercel/output, move that into .vercel/output
            # 2) Else if archive contains top-level .vercel/output (i.e. TMPDIR/.vercel/output), move it
            # 3) Else if archive contains the contents of .vercel/output directly (e.g. functions/, diagnostics/),
            #    then create .vercel/output and move those items into it
            # More robust extraction handling:
            # - If a nested .vercel/output exists anywhere, move it
            # - Else if a top-level .vercel/output exists, move it
            # - Else search for any 'functions' / 'diagnostics' dirs anywhere under TMPDIR
            #   and move them into .vercel/output. Also move common metadata files.
            FOUND_DIR=$(find "$TMPDIR" -type d -path '*/.vercel/output' | head -n1 || true)
            if [ -n "$FOUND_DIR" ]; then
              echo "Found nested .vercel/output at: $FOUND_DIR"
              rm -rf .vercel/output || true
              mkdir -p .vercel
              mv "$FOUND_DIR" .vercel/output
            elif [ -d "$TMPDIR/.vercel/output" ]; then
              echo "Found .vercel/output at top level in archive"
              rm -rf .vercel/output || true
              mv "$TMPDIR/.vercel" .vercel
            else
              # look for functions/diagnostics/static anywhere under TMPDIR
              FOUND_ANY=0
              while IFS= read -r -d '' DIR; do
                echo "Found directory to move: $DIR"
                mkdir -p .vercel/output
                mv "$DIR" .vercel/output/ || true
                FOUND_ANY=1
              done < <(find "$TMPDIR" -maxdepth 4 -type d \( -name functions -o -name diagnostics -o -name static \) -print0 || true)

              # Move top-level metadata files (builds.json, config.json) if present somewhere under TMPDIR
              for meta in builds.json config.json; do
                FOUND_META=$(find "$TMPDIR" -maxdepth 4 -type f -name "$meta" -print -quit || true)
                if [ -n "$FOUND_META" ]; then
                  mkdir -p .vercel/output
                  echo "Moving metadata file: $FOUND_META"
                  mv "$FOUND_META" .vercel/output/ || true
                  FOUND_ANY=1
                fi
              done

              # Also restore any .vercel/python runtime vendored tree if present in the artifact.
              # The Vercel CLI may access files under .vercel/python during deploy; ensure it's restored.
              FOUND_PY=$(find "$TMPDIR" -type d -path '*/.vercel/python' -print -quit || true)
              if [ -n "$FOUND_PY" ]; then
                echo "Found nested .vercel/python at: $FOUND_PY"
                rm -rf .vercel/python || true
                mkdir -p .vercel
                mv "$FOUND_PY" .vercel/python || true
              elif [ -d "$TMPDIR/.vercel/python" ]; then
                echo "Found top-level .vercel/python at: $TMPDIR/.vercel/python"
                rm -rf .vercel/python || true
                mkdir -p .vercel
                mv "$TMPDIR/.vercel/python" .vercel/python || true
              fi

              if [ "$FOUND_ANY" -eq 0 ]; then
                echo "Warning: artifact unzip didn't produce .vercel/output; listing extracted top-level for debugging:" >&2
                ls -la "$TMPDIR" || true
                find "$TMPDIR" -maxdepth 4 -type d -print || true
              fi
            fi

            rm -rf "$TMPDIR" || true
          fi

      - name: Install Vercel CLI
        run: |
          npm install -g vercel@latest

      - name: Deploy prebuilt output to Vercel (preview)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "Pre-deploy debug: listing .vercel and .vercel/output"
          ls -la .vercel || true
          echo "Disk usage of .vercel/output:"
          du -sh .vercel/output || true
          echo "List symbolic links under .vercel/output (if any):"
          find .vercel/output -maxdepth 4 -type l -ls || true
          echo "Largest files under .vercel/output (by size):"
          find .vercel/output -maxdepth 6 -type f -printf '%p %s\n' | sort -n | tail -n 40 || true
          echo "Also list a small tree of .vercel to show context"
          find .vercel -maxdepth 4 -ls || true
          echo "Listing .vercel/python (if present):"
          ls -la .vercel/python || true
          find .vercel/python -maxdepth 3 -ls || true
          echo "Creating placeholders for referenced vendored python paths (if any)..."
          set -euo pipefail
          # Create explicit pytest placeholders (common missing files observed in logs)
          mkdir -p .vercel/python/py3.12/backend/_vendor/_pytest
          touch .vercel/python/py3.12/backend/_vendor/_pytest/__init__.py || true
          touch .vercel/python/py3.12/backend/_vendor/_pytest/_argcomplete.py || true
          # also ensure common nested pytest internals exist (e.g. _code/code.py)
          mkdir -p .vercel/python/py3.12/backend/_vendor/_pytest/_code
          touch .vercel/python/py3.12/backend/_vendor/_pytest/_code/code.py || true
          # Collect any _vendor references from extracted output diagnostics and function files
          MATCHES=$(grep -R --binary-files=without-match -o "_vendor/[^\"'[:space:]]*" .vercel/output 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES" | sort -u | while read -r M; do
              REM=${M#*'_vendor/'}
              TARGET=".vercel/python/py3.12/backend/_vendor/$REM"
              DIR=$(dirname "$TARGET")
              mkdir -p "$DIR"
              if echo "$TARGET" | grep -qE '\\.(py|so|pyd)$'; then
                touch "$TARGET" || true
              else
                touch "$DIR/__init__.py" || true
              fi
            done
          else
            # fallback: ensure pytest package path exists to avoid lstat ENOENT from Vercel CLI
            mkdir -p .vercel/python/py3.12/backend/_vendor/_pytest
            touch .vercel/python/py3.12/backend/_vendor/_pytest/__init__.py
          fi

          npx vercel@latest deploy --prebuilt --token "$VERCEL_TOKEN" --yes --archive=tgz

