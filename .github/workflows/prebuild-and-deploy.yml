name: Prebuild and Deploy to Vercel (prebuilt)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - chore/vercel-ignore-extra
  pull_request:
    branches:
      - main

jobs:
  prebuild:
    name: Prebuild on GitHub runner (create .vercel/output)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies (wheelhouse)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then
            echo "Installing requirements.txt (slimmed root requirements)"
            pip install --prefer-binary -r requirements.txt
          elif [ -f backend/requirements.txt ]; then
            echo "Installing backend/requirements.txt (slim runtime deps)"
            pip install --prefer-binary -r backend/requirements.txt
          elif [ -f requirements-dev-minimal.txt ]; then
            echo "Installing requirements-dev-minimal.txt"
            pip install --prefer-binary -r requirements-dev-minimal.txt
          fi

      - name: Create venv and install backend dependencies (for prebuilt artifact)
        run: |
          echo "Creating .vercel/python/.venv and installing backend requirements if present"
          if [ -f backend/requirements.txt ] || [ -f requirements.txt ]; then
            python -m venv .vercel/python/.venv
            . .vercel/python/.venv/bin/activate
            python -m pip install --upgrade pip setuptools wheel
            if [ -f backend/requirements.txt ]; then
              pip install --prefer-binary -r backend/requirements.txt || true
            else
              pip install --prefer-binary -r requirements.txt || true
            fi
            deactivate || true

            # Ensure each installed package has an INSTALLER file under its .dist-info
            for site_dir in .vercel/python/.venv/lib/*/site-packages; do
              if [ ! -d "$site_dir" ]; then
                continue
              fi
              for d in "$site_dir"/*.dist-info; do
                if [ -d "$d" ]; then
                  if [ ! -f "$d/INSTALLER" ]; then
                    echo "pip" > "$d/INSTALLER" || true
                  fi
                fi
              done
            done
          else
            echo "No requirements file found to install into venv"
          fi

      - name: Install Vercel CLI
        run: |
          npm install -g vercel@latest

      - name: Run Vercel build (create .vercel/output)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel@latest pull --yes --token "$VERCEL_TOKEN" || true
          npx vercel@latest build --token "$VERCEL_TOKEN"

      - name: Verify prebuilt output
        run: |
          if [ -d .vercel/output ]; then
            echo ".vercel/output exists"
            ls -la .vercel/output || true
          else
            echo "No .vercel/output found - failing early for debug"
            ls -la || true
            exit 1
          fi

      - name: Include Python venv in prebuilt output
        if: always()
        run: |
          echo "Including .vercel/python into .vercel/output if present"
          if [ -d .vercel/python ]; then
            mkdir -p .vercel/output
            echo "Copying .vercel/python -> .vercel/output/.vercel_python/"
            # copy entire venv; place under a safe name inside output
            cp -a .vercel/python .vercel/output/.vercel_python || true
          else
            echo "No .vercel/python found to include"
          fi

      - name: Remove Python metadata and run secrets scan
        if: always()
        run: |
          echo "Removing any '*.dist-info' directories from .vercel/output to avoid leaking package metadata"
          if [ -d .vercel/output ]; then
            find .vercel/output -type d -name "*.dist-info" -prune -print0 | xargs -0 -r rm -rf || true
          else
            echo ".vercel/output not present; skipping dist-info cleanup"
          fi

      - name: Run gitleaks secrets scan (fail on detection)
        uses: zricethezav/gitleaks-action@v2
        with:
          args: --path=. --exit-code 1

      - name: Cleanup large files from .vercel/output
        if: always()
        run: |
          echo "Listing files in .vercel/output larger than 100MB (will remove)"
          find .vercel/output -type f -size +100M -print0 | xargs -0 du -b 2>/dev/null | sort -nr | tee large-files-to-remove.txt || true
          if [ -s large-files-to-remove.txt ]; then
            echo "Removing files >100MB from .vercel/output"
            find .vercel/output -type f -size +100M -print0 | xargs -0 rm -v || true
          else
            echo "No large files >100MB found in .vercel/output"
          fi

      - name: Create compressed artifact of .vercel/output
        if: always()
        run: |
          echo "Creating compressed archive output.tgz..."
          tar -C .vercel -czf output.tgz output || true

      - name: Local function size check
        if: always()
        run: |
          MAX_SIZE_MB=250
          echo "Generating function size listing..."
          du -ah .vercel/output 2>/dev/null | sort -rh | head -n 200 > function-size-listing.txt || true

          echo "Function sizes (MB):" > function-sizes.txt
          FOUND=0
          if [ -d .vercel/output/functions ]; then
            for d in .vercel/output/functions/*; do
              if [ -d "$d" ]; then
                sz_bytes=$(du -sb "$d" | awk '{print $1}')
                sz_mb=$((sz_bytes / 1024 / 1024))
                echo "$sz_mb $d" >> function-sizes.txt
                if [ "$sz_mb" -gt "$MAX_SIZE_MB" ]; then
                  echo "ERROR: Function too large: $d (${sz_mb}MB) > ${MAX_SIZE_MB}MB" >&2
                  FOUND=1
                fi
              fi
            done
          else
            echo ".vercel/output/functions not found; no functions to check." >> function-sizes.txt
          fi

          cat function-sizes.txt
          if [ "$FOUND" -eq 1 ]; then
            echo "One or more functions exceed ${MAX_SIZE_MB}MB. Failing prebuild." >&2
            exit 1
          fi

      - name: Upload function-size diagnostics
        if: always()
        uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9392
        with:
          name: function-sizes
          path: |
            function-size-listing.txt
            function-sizes.txt

      - name: Upload .vercel/output artifact
        uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9392
        with:
          name: vercel-output
          path: .vercel/output

  deploy:
    name: Deploy prebuilt output to Vercel (preview)
    needs: prebuild
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download vercel-output artifact (try action)
        uses: actions/download-artifact@f093f21ca4cfa7c75ccbbc2be54da76a0c7e1f05
        with:
          name: vercel-output
          path: .vercel/output
        continue-on-error: true

      - name: Restore prebuilt Python venv from artifact
        if: always()
        run: |
          echo "Attempting to restore .vercel/python from downloaded artifact"
          # artifact may contain .vercel/python under different roots; try common locations
          if [ -d .vercel/output/.vercel/python ]; then
            echo "Found .vercel/output/.vercel/python — copying to .vercel/python"
            mkdir -p .vercel/python
            # copy contents (including hidden files) reliably
            cp -a .vercel/output/.vercel/python/. .vercel/python/ || true
          fi
          if [ -d .vercel/output/python ]; then
            echo "Found .vercel/output/python — copying to .vercel/python"
            mkdir -p .vercel/python
            cp -a .vercel/output/python/. .vercel/python/ || true
          fi
          # Also check for the variant where the venv was placed under .vercel/output/.vercel_python
          if [ -d .vercel/output/.vercel_python ]; then
            echo "Found .vercel/output/.vercel_python — copying contents to .vercel/python"
            mkdir -p .vercel/python
            cp -a .vercel/output/.vercel_python/. .vercel/python/ || true
          fi

          # If the venv ended up directly under the root of the artifact
          if [ -d .vercel/output/.venv ]; then
            echo "Found .vercel/output/.venv — copying to .vercel/python/.venv"
            mkdir -p .vercel/python
            cp -a .vercel/output/.venv .vercel/python/.venv || true
          fi

          # Diagnostics to make restore issues visible in logs
          echo "--- .vercel/python contents (top-level) ---"
          ls -la .vercel/python || true
          echo "--- site-packages listing (if present) ---"
          ls -la .vercel/python/.venv/lib/python3.12/site-packages 2>/dev/null | head -n 40 || true
          echo "--- Checking for click INSTALLER ---"
          if [ -f ".vercel/python/.venv/lib/python3.12/site-packages/click-8.3.1.dist-info/INSTALLER" ]; then
            echo "click INSTALLER OK"
          elif [ -f ".vercel/python/.venv/lib64/python3.12/site-packages/click-8.3.1.dist-info/INSTALLER" ]; then
            echo "click INSTALLER OK (lib64)"
          else
            echo "click INSTALLER MISSING"
          fi
          if [ -d .vercel/python/.venv ]; then
            echo ".vercel/python restored successfully"
          else
            echo "No .vercel/python found inside artifact — deploy may still fail if venv missing"
          fi

      - name: Fallback - download artifact via GitHub API
        if: failure()
        run: |
          echo "Fallback: downloading artifact via gh API"
          set -e
          ART_ID=$(gh api repos/${{ github.repository }}/actions/artifacts --jq '.artifacts[] | select(.name=="vercel-output") | .id')
          if [ -z "$ART_ID" ]; then echo "Artifact 'vercel-output' not found"; exit 1; fi
          gh api repos/${{ github.repository }}/actions/artifacts/$ART_ID/zip --output vercel-output.zip
          mkdir -p .vercel
          unzip -q vercel-output.zip -d .vercel || true
          mv .vercel/output .vercel/output || true

      - name: Ensure backend build files for deploy
        run: |
          echo "Ensuring backend/build/lib/helpchain_backend exists for Vercel deploy"
          mkdir -p backend/build/lib/helpchain_backend
          if [ -d backend/helpchain_backend ]; then
            cp -r backend/helpchain_backend/* backend/build/lib/helpchain_backend/ || true
          fi
          if [ ! -f backend/build/lib/helpchain_backend/__init__.py ]; then
            echo "# packaging placeholder" > backend/build/lib/helpchain_backend/__init__.py
          fi

      - name: Set up Python for deploy job
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c
        with:
          python-version: '3.12'

      - name: Install backend package in editable mode
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e backend/ || true

      - name: Create egg-info placeholders
        run: |
          echo "Creating placeholder .egg-info files expected by Vercel CLI"
          mkdir -p backend/helpchain_backend_placeholder.egg-info
          # ensure minimal files exist so Vercel doesn't crash on lstat
          touch backend/helpchain_backend_placeholder.egg-info/requires.txt || echo "" > backend/helpchain_backend_placeholder.egg-info/requires.txt
          touch backend/helpchain_backend_placeholder.egg-info/dependency_links.txt || echo "" > backend/helpchain_backend_placeholder.egg-info/dependency_links.txt

      - name: Install Vercel CLI
        run: |
          npm install -g vercel@latest

      - name: Deploy prebuilt output to Vercel (preview)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # ensure uv.lock exists (Vercel CLI may expect it during deploy)
          mkdir -p backend
          if [ ! -f backend/uv.lock ]; then
            echo "" > backend/uv.lock
          fi

          npx vercel@latest deploy --prebuilt --token "$VERCEL_TOKEN" --yes --archive=tgz

