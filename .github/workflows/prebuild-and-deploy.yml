name: Prebuild and Deploy to Vercel (prebuilt)

on:
  push:
    branches:
      - main
      - chore/vercel-ignore-extra
  pull_request:
    branches:
      - main

jobs:
  prebuild-and-deploy:
    name: Prebuild on GitHub runner and deploy (preview)
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # avoid failing the job if the repo has a broken or missing submodule URL
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies (wheelhouse)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Prefer a lightweight/dev requirements file for prebuild to avoid heavy ML deps
          if [ -f requirements-dev-minimal.txt ]; then
            pip install --prefer-binary -r requirements-dev-minimal.txt
          elif [ -f requirements.txt ]; then
            pip install --prefer-binary -r requirements.txt
          fi

      - name: Install Vercel CLI
        run: |
          npm install -g vercel@latest

      - name: Run Vercel build (create .vercel/output)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Pull project settings so `vercel build` has local project config
          npx vercel@latest pull --yes --token "$VERCEL_TOKEN" || true

          # build on the runner using Vercel builders and produce the Build Output API format
          npx vercel@latest build --token "$VERCEL_TOKEN"

      - name: Verify prebuilt output
        run: |
          if [ -d .vercel/output ]; then
            echo ".vercel/output exists"
            ls -la .vercel/output || true
          else
            echo "No .vercel/output found - failing early for debug"
            ls -la || true
            exit 1
          fi

      - name: Check prebuilt output size and list large files
        run: |
          echo "Calculating size of .vercel/output..."
          total_bytes=$(du -sb .vercel/output | cut -f1)
          echo "Total bytes: $total_bytes"
          echo "Top 20 largest files:" 
          find .vercel/output -type f -printf "%s\t%p\n" | sort -nr | head -n 20

          # Create a compressed archive for inspection (may be large)
          echo "Creating compressed archive output.tgz (for size check)..."
          tar -C .vercel -czf output.tgz output || true
          archive_size=$(stat -c%s .vercel/output.tgz || stat -f%z .vercel/output.tgz || echo 0)
          echo "Archive bytes: $archive_size"

          # Fail early if archive exceeds Node/CLI buffer limit (~4GB)
          limit=$((4294967296))
          if [ "$archive_size" -ge "$limit" ]; then
            echo "ERROR: Archive is >= 4GB (possible Node Buffer limit)."
            echo "List the largest files above and update .vercelignore or reduce build output."
            exit 1
          fi

      - name: Deploy prebuilt output to Vercel (preview)
        if: always()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Deploy the prebuilt output; omit --prod to create a preview deployment
          npx vercel@latest deploy --prebuilt --token "$VERCEL_TOKEN" --yes --archive=tgz

