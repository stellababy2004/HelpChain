name: Database Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "5 2 * * *"

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect database file
        id: detect_db
        shell: bash
        run: |
          set -euo pipefail
          echo "Searching for SQLite DB file to back up..."
          candidates=(
            "instance/volunteers.db"
            "backend/instance/volunteers.db"
            "backend/test_local.sqlite"
          )
          found=""
          for p in "${candidates[@]}"; do
            if [ -f "$p" ]; then
              found="$p"
              break
            fi
          done

          if [ -n "$found" ]; then
            echo "Found DB at: $found"
            echo "db_path=$found" >> "$GITHUB_OUTPUT"
          else
            echo "No DB file found in repo checkout; backup will be skipped."
            echo "db_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: ${{ steps.detect_db.outputs.db_path != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create backup script
        if: ${{ steps.detect_db.outputs.db_path != '' }}
        shell: bash
        run: |
          cat > backup_db.py <<'PY'
          import os, sys, gzip, shutil, datetime, pathlib

          db_path = os.environ.get("DB_PATH", "").strip()
          if not db_path:
              print("No DB_PATH provided; nothing to do.")
              sys.exit(0)
          if not os.path.exists(db_path):
              print(f"Database not found at {db_path}; skipping.")
              sys.exit(0)

          base = pathlib.Path("backups")
          base.mkdir(parents=True, exist_ok=True)

          ts = datetime.datetime.utcnow().strftime("%Y%m%dT%H%M%SZ")
          db_name = pathlib.Path(db_path).stem
          out_name = f"{db_name}-{ts}.sqlite.gz"
          out_path = base / out_name

          with open(db_path, "rb") as src, gzip.open(out_path, "wb", compresslevel=6) as dst:
              shutil.copyfileobj(src, dst)

          print(f"Backup created: {out_path}")

          # Keep only last N local backups in the runner workspace (cosmetic)
          keep = 7
          files = sorted(base.glob(f"{db_name}-*.sqlite.gz"))
          old = files[:-keep] if len(files) > keep else []
          for f in old:
              try:
                  f.unlink()
                  print(f"Pruned old backup: {f}")
              except Exception as e:
                  print(f"Warning: could not remove {f}: {e}")
          PY

      - name: Run backup
        if: ${{ steps.detect_db.outputs.db_path != '' }}
        env:
          DB_PATH: ${{ steps.detect_db.outputs.db_path }}
        run: python backup_db.py

      - name: Upload backup artifact
        if: ${{ steps.detect_db.outputs.db_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: database-backup
          path: backups/*.sqlite.gz
          if-no-files-found: error
          retention-days: 14

      # ---- S3 UPLOAD (matches your tightened IAM policy) ----
      - name: Configure AWS credentials
        if: ${{ steps.detect_db.outputs.db_path != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload backups to S3 (backups/ prefix + SSE)
        if: ${{ steps.detect_db.outputs.db_path != '' }}
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        shell: bash
        run: |
          set -euo pipefail
          bucket="${S3_BUCKET:-helpchain-prod-backups}"
          echo "Uploading backups to s3://$bucket/backups/"

          # Put each file under backups/ + enforce headers required by IAM policy
          for f in backups/*.sqlite.gz; do
            [ -e "$f" ] || { echo "No backup files found."; exit 1; }
            aws s3 cp "$f" "s3://$bucket/backups/$(basename "$f")" \
              --sse AES256 \
              --acl bucket-owner-full-control
          done

      - name: Skipped (no DB found)
        if: ${{ steps.detect_db.outputs.db_path == '' }}
        run: echo "No database file found; backup job skipped."
