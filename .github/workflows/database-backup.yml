name: Database Backup

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install sqlalchemy

      - name: Create backup script
        run: |
          cat > backup_db.py << 'EOF'
          import os
          import sqlite3
          from datetime import datetime
          import gzip
          import shutil

          # Database backup script
          DB_PATH = os.getenv("DATABASE_URL", "instance/volunteers.db")
          BACKUP_DIR = "backups"

          if not os.path.exists(DB_PATH):
              print(f"Database not found at {DB_PATH}")
              exit(1)

          os.makedirs(BACKUP_DIR, exist_ok=True)

          # Create backup filename with timestamp
          timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
          backup_file = f"{BACKUP_DIR}/backup_{timestamp}.db"

          # Copy database file
          shutil.copy2(DB_PATH, backup_file)

          # Compress backup
          with open(backup_file, 'rb') as f_in:
              with gzip.open(f"{backup_file}.gz", 'wb') as f_out:
                  shutil.copyfileobj(f_in, f_out)

          # Remove uncompressed backup
          os.remove(backup_file)

          # Keep only last 7 backups
          backups = sorted([f for f in os.listdir(BACKUP_DIR) if f.endswith('.gz')])
          if len(backups) > 7:
              for old_backup in backups[:-7]:
                  os.remove(os.path.join(BACKUP_DIR, old_backup))

          print(f"Backup created: {backup_file}.gz")
          print(f"Backup size: {os.path.getsize(backup_file + '.gz')} bytes")
          EOF

      - name: Run backup
        run: python backup_db.py

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backup
          path: backups/
          retention-days: 7
