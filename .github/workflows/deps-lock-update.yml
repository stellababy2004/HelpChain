name: deps-lock-update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 03:00 UTC
  push:
    paths:
      - 'backend/requirements.in'

jobs:
  update-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Compile requirements
        working-directory: backend
        run: pip-compile requirements.in --output-file requirements.txt

      - name: Detect changes
        id: changes
        working-directory: backend
        run: |
          if git diff --quiet requirements.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Capture requirements diff
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: git diff requirements.txt > dependency-diff.txt

      - name: Run vulnerability audit (pip-audit)
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt -f json > audit.json || echo "pip-audit finished with code $? (continuing)"
          pip-audit -r requirements.txt > audit.txt || true

      - name: Open Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update pinned dependencies (pip-compile)"
          branch: deps/update-${{ github.run_id }}
          base: ${{ github.ref_name }}
          title: "chore: dependency lock refresh"
          body: "Automated dependency update via pip-compile. See linked issue for diff and audit results."
          labels: dependencies,automation

      - name: Create / update dependency update issue
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diffPath = 'backend/dependency-diff.txt';
            let diff = '';
            try { diff = fs.readFileSync(diffPath, 'utf8'); } catch (e) { diff = 'Diff file not found.'; }
            let audit = '';
            try { audit = fs.readFileSync('backend/audit.txt','utf8'); } catch(e) { audit = 'No audit.txt'; }
            let auditJson = '';
            try { auditJson = fs.readFileSync('backend/audit.json','utf8'); } catch(e) { auditJson = ''; }
            const today = new Date().toISOString().substring(0,10);
            const titlePrefix = 'Dependency update: requirements.txt';
            const title = `${titlePrefix} (${today})`;
            // List open issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const existing = issues.find(i => i.title.startsWith(titlePrefix));
            // Basic vulnerability extraction (text form)
            let vulnSummary = '';
            if (audit && audit.includes('Vulnerabilities')) {
              vulnSummary = audit.split('\n').slice(0,200).join('\n');
            }
            const body = [
              'Automated dependency lock refresh via pip-compile.',
              `Workflow run id: ${context.runId}`,
              '',
              'Diff (truncated if very long):',
              '```diff',
              diff.length > 60000 ? diff.substring(0,60000) + '\n... (truncated)' : diff,
              '```'
              '',
              'Vulnerability scan (pip-audit):',
              '```',
              vulnSummary || 'No vulnerabilities detected or audit output unavailable.',
              '```'
            ].join('\n');
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: vulnSummary ? ['dependencies','automation','security'] : ['dependencies','automation']
              });
            }
      # Optional Slack notification step intentionally omitted to keep lint clean

      - name: No changes message
        if: steps.changes.outputs.changed != 'true'
        run: echo "No dependency changes detected."
