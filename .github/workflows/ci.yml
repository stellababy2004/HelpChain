name: CI – Lint • Security • Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # ensure tools even if не са в requirements
          pip install ruff black bandit pytest

      - name: Ruff Lint
        run: ruff check .

      - name: Black (check only)
        run: black --check .

      - name: Bandit Security Scan
        run: |
          bandit -r . -x tests,.venv,venv,node_modules,frontend --severity-level medium --exit-zero

      - name: Pytest
        run: |
          pytest -v --maxfail=1 --disable-warnings --junitxml=pytest-report.xml
        continue-on-error: false

      - name: Check for pytest report
        id: check_pytest_report
        run: |
          if [ -f pytest-report.xml ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Pytest Report
        if: steps.check_pytest_report.outputs.exists == 'true'
        uses: actions/upload-artifact@v3
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: pytest-report.xml
