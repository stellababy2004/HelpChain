name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install deps (minimal dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev-minimal.txt

      - name: Ruff (workflow files only)
        shell: bash
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^\.github/workflows/.*\.yml$' || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "No Python files changed in last commit; skipping Ruff."
          else
            echo "No workflow files changed"
          fi

      - name: Black (workflow files only)
        shell: bash
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^\.github/workflows/.*\.yml$' || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "No Python files changed in last commit; skipping Black."
          else
            echo "No workflow files changed"
          fi

  smoke:
    name: Smoke Gate (admin + integrity)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install deps (minimal dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev-minimal.txt

      - name: Smoke Tests
        run: pytest -q -m smoke_admin tests/test_system_integrity.py

  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-
            pip-${{ runner.os }}-

      - name: Install deps (minimal dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev-minimal.txt

      - name: Pytest
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: pytest -q