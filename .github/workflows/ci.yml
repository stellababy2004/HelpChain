name: CI – Lint • Security • Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # ensure tools even if не са в requirements
          pip install ruff black bandit pytest

      - name: Ruff Lint
        run: ruff check .

      - name: Black (check only)
        run: black --check .

      - name: Bandit Security Scan
        run: |
          bandit -r . -x tests,.venv,venv,node_modules,frontend --severity-level medium --exit-zero

      - name: Pytest
        run: |
          pytest -v --maxfail=1 --disable-warnings --junitxml=pytest-report.xml
        continue-on-error: false

      - name: Upload Pytest Report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: pytest-report.xml
