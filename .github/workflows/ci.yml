name: CI – Lint • Security • Tests

on:
  push:
    steps:
    - name: Checkout
      uses: actions/checkout@34e1148

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements-dev.txt ]; then
          pip install -r requirements-dev.txt
        fi
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        # ensure tools even if не са в requirements
        pip install ruff black bandit pytest

    - name: Ruff Lint
      run: ruff check .

    - name: Black (check only)
      run: black --check .

    - name: Bandit Security Scan
      run: |
        bandit -r . -x tests,.venv,venv,node_modules,frontend --severity-level medium --exit-zero

    - name: Pytest
      run: |
        pytest -v --maxfail=1 --disable-warnings --junitxml=pytest-report.xml
      continue-on-error: false

    - name: Upload Pytest Report
      if: always()
      uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9392
      with:
        name: pytest-report-${{ matrix.python-version }}
        path: pytest-report.xml
        run: black --check .

      - name: Bandit Security Scan
        run: |
          bandit -r . -x tests,.venv,venv,node_modules,frontend --severity-level medium --exit-zero

      - name: Pytest
        continue-on-error: false
        run: |
          pytest -v --maxfail=1 --disable-warnings --junitxml=pytest-report.xml

      - name: Upload Pytest Report
        if: always()
        uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9392
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: pytest-report.xml
