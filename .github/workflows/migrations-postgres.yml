name: Валидиране на миграции в Postgres

on:
  push:
    branches: [main, recover-workflows]
  pull_request:
    branches: [main]

jobs:
  migrations-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: helpchain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval=5s --health-timeout=5s --health-retries=10

    # Set DATABASE_URL at the job level so all steps (and scripts) inherit it
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/helpchain_test
      USE_POSTGRES: "true"

    steps:
      - name: Вземане на кода (checkout)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Настройка на Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c
        with:
          python-version: "3.11"

      - name: Чакам Postgres да е готов
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 && break || sleep 1
          done

      - name: "Кеширане на pip зависимости (org policy: actions/cache not pinned)"
        run: |
          echo "Org policy requires actions to be pinned; skipping actions/cache and proceeding without caching."
          mkdir -p ~/.cache/pip || true

      - name: Инсталиране на зависимости
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Инсталиране на Postgres драйвер (psycopg2)
        run: |
          # Ensure psycopg2 driver is available in the CI environment.
          # Installing psycopg2-binary is a low-risk, widely used approach for CI.
          python -m pip install psycopg2-binary

      - name: Install psql client
        run: |
          # psql client may not be present on the runner by default; install it so we can run pre-migration housekeeping
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client

      - name: Drop existing Postgres enum types (if any)
        env:
          PGPASSWORD: postgres
        run: |
          # Verbose diagnostic: list existing enum types, attempt drops, then list again.
          set -euo pipefail
          echo "-- Listing enum types BEFORE drop --"
          psql -h localhost -U postgres -d helpchain_test -v ON_ERROR_STOP=1 -c "SELECT n.nspname AS schema, t.typname AS type FROM pg_type t JOIN pg_namespace n ON t.typnamespace = n.oid WHERE t.typtype = 'e' ORDER BY schema, type;" || true

          echo "-- Attempting to drop known enum types (if present) --"
          psql -h localhost -U postgres -d helpchain_test -v ON_ERROR_STOP=1 -c "DROP TYPE IF EXISTS roleenum CASCADE;" || true
          psql -h localhost -U postgres -d helpchain_test -v ON_ERROR_STOP=1 -c "DROP TYPE IF EXISTS adminrole CASCADE;" || true
          psql -h localhost -U postgres -d helpchain_test -v ON_ERROR_STOP=1 -c "DROP TYPE IF EXISTS priorityenum CASCADE;" || true
          psql -h localhost -U postgres -d helpchain_test -v ON_ERROR_STOP=1 -c "DROP TYPE IF EXISTS notificationtypeenum CASCADE;" || true
          psql -h localhost -U postgres -d helpchain_test -v ON_ERROR_STOP=1 -c "DROP TYPE IF EXISTS notificationstatusenum CASCADE;" || true
          psql -h localhost -U postgres -d helpchain_test -v ON_ERROR_STOP=1 -c "DROP TYPE IF EXISTS useractivitytypeenum CASCADE;" || true

          echo "-- Listing enum types AFTER drop --"
          psql -h localhost -U postgres -d helpchain_test -v ON_ERROR_STOP=1 -c "SELECT n.nspname AS schema, t.typname AS type FROM pg_type t JOIN pg_namespace n ON t.typnamespace = n.oid WHERE t.typtype = 'e' ORDER BY schema, type;" || true

      - name: Изпълняване на Alembic миграции (използвай backend/run_migrations.py ако е наличен)
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/helpchain_test
        run: |
          set -euo pipefail
          if [ -f backend/run_migrations.py ]; then
            python backend/run_migrations.py
          else
            python -m alembic -c backend/migrations/alembic.ini upgrade head
          fi

      # Optional import-time check removed to avoid pre-importing conflicting test modules

      - name: Стартиране на тестове с coverage (по избор)
        if: always()
        run: |
          # Стартираме pytest с coverage; ако има тестове ще подаваме coverage.xml
          # Use the backend pytest config explicitly to avoid loading a top-level pytest.ini
          if [ -f backend/pytest.ini ] || [ -d backend/tests ]; then
            python -m pip install pytest pytest-cov || true
            # Run pytest from repository root but point explicitly to backend/pytest.ini
            # Write coverage XML to repository root
            pytest -c backend/pytest.ini --rootdir=backend -q --maxfail=1 --disable-warnings --cov=backend --cov-report=xml:coverage.xml
          else
            echo "Няма pytest конфигурация или tests/ директория; пропускане на тестовете"
          fi

      - name: Качване на артефакт coverage.xml
        if: always()
        uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9392
        with:
          name: coverage-xml
          # pytest now writes coverage XML to the repository root (../coverage.xml from backend)
          path: coverage.xml
