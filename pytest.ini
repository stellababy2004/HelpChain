[pytest]
# Ensure CI/test runners invoked from the repository root only discover real tests
# located under backend/tests and avoid scanning developer helper folders which
# contain files named like tests (e.g. dev_scripts/test_*.py).

testpaths = backend/tests
python_files = test_*.py
norecursedirs = backend/dev_scripts backend/scripts dev_scripts scripts .venv venv venv_old htmlcov old_db .git __pycache__
[pytest]
# Keep search paths and basic discovery consistent with previous config
norecursedirs = HelpChain.bg helpchain_backend .venv venv venv_old htmlcov old_db .git __pycache__
testpaths =
    tests
    .
python_files = test_*.py
pythonpath = .

# Central pytest warning filters to reduce CI noise for well-known, low-risk deprecations.
# These target dependency and test-helper deprecations only; they do not hide test failures.
filterwarnings =
    # dateutil / tz: timezone-aware recommendation
    ignore:datetime\.datetime\.utcfromtimestamp\(\) is deprecated:DeprecationWarning:dateutil.tz.tz

    # pyOpenSSL / cryptography deprecations used by test helpers
    ignore:CSR support in pyOpenSSL is deprecated.:DeprecationWarning
    # map cryptography-specific deprecation messages to generic DeprecationWarning
    ignore:ARC4 has been moved:DeprecationWarning
    ignore:TripleDES has been moved:DeprecationWarning
    ignore:Use CertificateIssuerPublicKeyTypes instead:DeprecationWarning
    ignore:Use CertificateIssuerPrivateKeyTypes instead:DeprecationWarning
    ignore:Use CertificatePublicKeyTypes instead:DeprecationWarning
    ignore:Use PrivateKeyTypes instead:DeprecationWarning

    # SQLAlchemy / sqlite adapter deprecation (Python 3.12+)
    ignore:The default datetime adapter is deprecated as of Python 3.12:DeprecationWarning:sqlalchemy.engine.default

    # Protobuf / google deprecation noise (PyType_Spec/metaclass warnings)
    ignore:Type google\._upb\._message\.MessageMapContainer uses PyType_Spec with a metaclass that has custom tp_new.:DeprecationWarning:google._upb._message
    ignore:Type google\._upb\._message\.ScalarMapContainer uses PyType_Spec with a metaclass that has custom tp_new.:DeprecationWarning:google._upb._message

    # Local non-critical runtime deprecation from ai_service
    ignore:There is no current event loop:DeprecationWarning:backend.ai_service

    # Quiet noisy deprecations coming from test helper imports (low-risk)
    # These originate in our tests' conftest helper and from protobuf internals
    ignore:::tests.conftest
    ignore:::google._upb._message

    # (Test-return warnings were addressed in recent test edits)
[addopts]
addopts = -v

# Additional pytest runtime settings
python_functions = test_*
log_cli_level = INFO
pythonpath = backend
