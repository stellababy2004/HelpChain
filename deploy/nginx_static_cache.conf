# nginx static cache snippet for HelpChain
# Place this file in your nginx include path and include it in your site config for staging/production.
# It sets long TTLs for fingerprinted assets and a shorter TTL for non-fingerprinted /static/ files.

## Fingerprinted assets (e.g. app-abcdef12.js or app.abcdef12.js)
location ~* ^/static/.+-[a-f0-9]{8,}\.(?:js|css|png|jpg|jpeg|gif|ico|svg)$ {
    access_log off;
    # Serve directly from filesystem; if you proxy to an upstream, keep proxy headers
    try_files $uri =404;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    # Allow basic CORS for fonts or cross-origin assets; restrict to your domains if needed
    add_header Access-Control-Allow-Origin "*" always;
}

## General static files under /static/
location /static/ {
    access_log off;
    try_files $uri $uri/ =404;
    # shorter TTL for non-fingerprinted assets (adjust as needed for staging)
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    add_header Access-Control-Allow-Origin "*" always;
}

# Notes:
# - The fingerprint detection uses a dash followed by an 8+ hex hash; adapt the regex if
#   your build outputs use a different pattern (e.g. dot-separated hash or no dash).
# - If you use a proxy_pass for static files, remove `try_files` and ensure the upstream
#   serves the files. Keep the add_header directives so Nginx sets the cache headers.
# - For advanced setups consider using `map` at http level to compute header values
#   and then `add_header` with a variable — that is more performant when you have many
#   different caching rules.
## Example nginx snippet for serving static assets with caching

location /static/ {
    alias /path/to/your/app/backend/static/;
    access_log off;
    # Default TTL for general static files
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
}

# Longer TTL for fingerprinted assets (example: app.abcdef12.js)
location ~* /static/.*\.[0-9a-f]{8,}\.(js|css|png|jpg|svg)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
}
