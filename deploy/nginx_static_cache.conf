# Nginx static cache snippet for HelpChain

# Place this snippet and include it in your site configuration for staging/production.
# It sets long TTLs for fingerprinted assets and a shorter TTL for non-fingerprinted /static/ files.

location ~* ^/static/(.*)\.(?:css|js|png|jpg|jpeg|gif|ico|svg)$ {
    # Serve from filesystem or upstream, then set headers
    # If you're using proxy_pass, keep the proxy headers and use add_header below.

    # Try the file locally for performance
    try_files $uri $uri/ =404;

    # Fingerprinted assets (with a hash in filename) are cache-immutable
    if ($uri ~* "-[a-f0-9]{8,}\.[a-z]+$") {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    # Non-fingerprinted static assets: medium TTL (configured for staging)
    add_header Cache-Control "public, max-age=3600";

    # Add CORS if needed for fonts or cross-origin loading
    add_header Access-Control-Allow-Origin "*";
}
