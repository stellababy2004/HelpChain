## Example nginx snippet for serving static assets with caching

location /static/ {
    alias /path/to/your/app/backend/static/;
    access_log off;
    # Default TTL for general static files
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
}

# Longer TTL for fingerprinted assets (example: app.abcdef12.js)
location ~* /static/.*\.[0-9a-f]{8,}\.(js|css|png|jpg|svg)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
}
