# ruff.toml — standalone конфигурация

# Общи настройки
line-length = 200
target-version = "py311"
force-exclude = true

# Изключвания (backup-и, vendor, venv и т.н.)
extend-exclude = [
  "backend/backups/*",
  "**/*.backup*.py",
  "**/appy.backup*.py",
  # Legacy standalone Flask app entrypoints kept for reference; not part of the current app factory.
  "backend/appy_with_analytics.py",
  "backend/notification_dashboard.py",
  "**/appy_with_analytics.py",
  "**/notification_dashboard.py",
  "**/security_logging.py",
  "migrations/**",
  "tests/**",
  "vendor",
  "backend/vendor",
  "backend/helpchain-backend/vendor",
  ".venv",
  "venv",
  "_vendor",
]

# Линт правила
[lint]
# Включи базовите набори + import order (I) и pyupgrade (UP)
select = ["E", "F", "I", "B", "UP"]
# Ако искаш да игнорираш нещо, добави тук:
ignore = ["E203", "E501", "E402", "F841", "B008", "F401", "B007", "E722", "UP038", "B904", "F811"]
# Разреши автофиксове (за локално ruff --fix; pre-commit може да го override-не)
fixable = ["ALL"]

# Форматиране (ако ползваш ruff-format)
[format]
# По избор: "double"|"single"|"preserve"
quote-style = "double"
